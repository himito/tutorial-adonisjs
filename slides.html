v>\n  <\u002Fsection>\n\n  <!-- 20 · CRUD -->\n  <section class=\"s\" data-label=\"CRUD\">\n    <div class=\"kicker rise\"><span class=\"ix\">3.8<\u002Fspan> CRUD with Lucid<\u002Fdiv>\n    <h2 class=\"title rise\">Create · Read · Update · Delete<\u002Fh2>\n    <div class=\"codecard rise d1\" style=\"margin-top:28px\">\n      <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\">lucid.ts<\u002Fspan><\u002Fdiv>\n      <pre><code data-lang=\"ts\">const todo = await Todo.create({ title: 'Write the slides' })\n\nconst one  = await Todo.findOrFail(1)         // throws 404 if missing\nconst open = await Todo.query()\n  .where('completed', false)\n  .orderBy('created_at', 'desc')\n\nawait todo.merge({ completed: true }).save()  // update\nawait todo.delete()                           // delete<\u002Fcode><\u002Fpre>\n    <\u002Fdiv>\n    <p class=\"ptext rise d2\" style=\"max-width:none\"><b>Active Record:<\u002Fb> the class queries the table, each instance is a row. Return one from a controller and it serializes to JSON automatically.<\u002Fp>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 21 · DIVIDER 04 Endpoints test-first -->\n  <section class=\"s dark\" data-label=\"04 Endpoints\">\n    <div class=\"divider\">\n      <div class=\"divtag rise\">Module 04<\u002Fdiv>\n      <div class=\"divnum rise\">04<\u002Fdiv>\n      <h2 class=\"divlabel rise d1\">Endpoints, test-first<\u002Fh2>\n      <p class=\"divsub rise d2\">Now the rhythm kicks in: describe the todos endpoints with a test, watch it fail, then build the route and controller to green.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 22 · Start with the test -->\n  <section class=\"s\" data-label=\"Endpoint spec\">\n    <div class=\"kicker rise\"><span class=\"ix\">4.1<\u002Fspan> Start with a test<\u002Fdiv>\n    <h2 class=\"title rise\">Describe it first<\u002Fh2>\n    <p class=\"ptext rise d1\" style=\"max-width:none;margin-top:12px\">Describe the behaviour as a test, then run it and watch it fail.<\u002Fp>\n    <div class=\"row rise d2\" style=\"margin-top:22px;gap:44px\">\n      <div class=\"col\" style=\"flex:1.2\">\n        <div class=\"codecard sm\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\"><span class=\"path\">tests/functional/<\u002Fspan>todos.spec.ts<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"ts\">test.group('Todos', (group) =&gt; {\n  group.each.setup(() =&gt;\n    testUtils.db().withGlobalTransaction())\n\n  test('lists todos', async ({ client }) =&gt; {\n    const res = await client.get('/todos')\n    res.assertOk()\n  })\n})<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"col\" style=\"flex:1\">\n        <p style=\"font-size:25px;font-weight:700;margin:2px 0 10px;color:var(--ink)\">Generate the test file<\u002Fp>\n        <div class=\"term\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\">bash<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"bash\">node ace make:test todos --suite=functional\n<span class=\"ok\">✔ CREATE tests/functional/todos.spec.ts<\u002Fspan><\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n        <p style=\"font-size:25px;font-weight:700;margin:16px 0 10px;color:var(--ink)\">Then run the suite<\u002Fp>\n        <div class=\"term\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\">bash<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"bash\">npm run test\n<span class=\"bad\">  ✖ lists todos<\u002Fspan>\n<span class=\"bad\">  1 failed (1)<\u002Fspan><\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n        <p class=\"ptext\" style=\"margin-top:12px;font-size:26px;max-width:none\">It fails with a <b style=\"color:var(--danger)\">404<\u002Fb> — there's no route yet.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Make lists todos green (minimal) -->\n  <section class=\"s\" data-label=\"Make it green\">\n    <div class=\"kicker rise\"><span class=\"ix\">4.2<\u002Fspan> Make it green<\u002Fdiv>\n    <h2 class=\"title rise\">The smallest code that passes<\u002Fh2>\n    <p class=\"ptext rise d1\" style=\"max-width:none;margin-top:12px\">Write <i>just enough<\u002Fi> to satisfy the test — one action, one route.<\u002Fp>\n    <div class=\"row rise d2\" style=\"margin-top:22px;gap:44px\">\n      <div class=\"col\" style=\"flex:1.1\">\n        <p style=\"font-size:25px;font-weight:700;margin:2px 0 8px;color:var(--ink)\">Scaffold it, implement one action<\u002Fp>\n        <div class=\"term\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\">bash<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"bash\">node ace make:controller Todo\n<span class=\"ok\">✔ CREATE controllers/todos_controller.ts<\u002Fspan><\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n        <div class=\"codecard sm\" style=\"margin-top:14px\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\"><span class=\"path\">app/controllers/<\u002Fspan>todos_controller.ts<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"ts\">export default class TodosController {\n  async index({ response }: HttpContext) {\n    const todos = await Todo.all()\n    return response.ok(todos)\n  }\n}<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"col\" style=\"flex:1\">\n        <p style=\"font-size:25px;font-weight:700;margin:2px 0 8px;color:var(--ink)\">Add one route<\u002Fp>\n        <div class=\"codecard sm\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\"><span class=\"path\">start/<\u002Fspan>routes.ts<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"ts\">const TodosController = () =&gt;\n  import('#controllers/todos_controller')\nrouter.get('/todos', [TodosController, 'index'])<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n        <div class=\"term\" style=\"margin-top:14px\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\">bash<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"bash\">npm run test\n<span class=\"ok\">  ✔ lists todos<\u002Fspan>\n<span class=\"ok\">  1 passed (1)<\u002Fspan><\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n        <div class=\"greenbox\" style=\"margin-top:14px;padding:16px 22px\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n          <p><b>Green!<\u002Fb> Now build out the rest the same way.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Red: describe the rest -->\n  <section class=\"s\" data-label=\"Spec the rest\">\n    <div class=\"kicker rise\"><span class=\"ix\">4.3<\u002Fspan> Describe the rest first<\u002Fdiv>\n    <h2 class=\"title rise\">Four more endpoints, four more tests<\u002Fh2>\n    <p class=\"ptext rise d1\" style=\"max-width:none;margin-top:12px\">Same rhythm: write the tests for <b>create, show, update &amp; delete<\u002Fb> — and watch them fail before writing a line of logic.<\u002Fp>\n    <div class=\"row rise d2\" style=\"margin-top:22px;gap:44px\">\n      <div class=\"col\" style=\"flex:1.3\">\n        <div class=\"codecard sm\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\"><span class=\"path\">tests/functional/<\u002Fspan>todos.spec.ts<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"ts\" style=\"line-height:1.3\">test('creates a todo', async ({ client }) =&gt; {\n  const res = await client.post('/todos')\n    .json({ title: 'Write slides' })\n  res.assertCreated()\n})\n\ntest('deletes a todo', async ({ client }) =&gt; {\n  const todo = await Todo.create({ title: 'Bye' })\n  const res = await client.delete(`/todos/${todo.id}`)\n  res.assertNoContent()\n})\n// …plus 'shows a todo' &amp; 'updates a todo'<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"col\" style=\"flex:1\">\n        <p style=\"font-size:25px;font-weight:700;margin:2px 0 10px;color:var(--ink)\">Run the suite<\u002Fp>\n        <div class=\"term\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\">bash<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"bash\">npm run test\n<span class=\"ok\">  ✔ lists todos<\u002Fspan>\n<span class=\"bad\">  ✖ creates a todo<\u002Fspan>\n<span class=\"bad\">  ✖ shows a todo<\u002Fspan>\n<span class=\"bad\">  ✖ updates a todo<\u002Fspan>\n<span class=\"bad\">  ✖ deletes a todo<\u002Fspan>\n<span class=\"bad\">  1 passed, 4 failed (5)<\u002Fspan><\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n        <p class=\"ptext\" style=\"margin-top:14px;font-size:26px;max-width:none\">Four reds — now build the controller actions that turn them green.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 24 · Make it green: controllers -->\n  <section class=\"s\" data-label=\"Controllers\">\n    <div class=\"kicker rise\"><span class=\"ix\">4.4<\u002Fspan> The other actions<\u002Fdiv>\n    <h2 class=\"title rise\">Now build out the rest<\u002Fh2>\n    <div class=\"row rise d1\" style=\"margin-top:14px;gap:46px\">\n      <div class=\"col\" style=\"flex:1\">\n        <p style=\"font-size:25px;font-weight:700;margin:0 0 10px;color:var(--ink)\">Scaffold the full resource<\u002Fp>\n        <div class=\"term\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\">bash<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"bash\">node ace make:controller Todo --resource\n<span class=\"ok\">✔ CREATE controllers/todos_controller.ts<\u002Fspan><\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n        <p class=\"ptext\" style=\"margin-top:20px;font-size:30px;max-width:none\">The <code>--resource<\u002Fcode> flag scaffolds all five REST actions. Each gets an <code>HttpContext<\u002Fcode> — request, response, params, auth, bouncer — in one object. Destructure what you need.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"col\" style=\"flex:1.4\">\n        <div class=\"codecard sm\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\"><span class=\"path\">app/controllers/<\u002Fspan>todos_controller.ts<\u002Fspan><\u002Fdiv>\n          <pre style=\"padding:20px 30px\"><code data-lang=\"ts\" style=\"line-height:1.16\">export default class TodosController {\n  async index({ response }: HttpContext) {\n    return response.ok(await Todo.all())\n  }\n  async store({ request, response }: HttpContext) {\n    const data = request.only(['title', 'completed'])\n    return response.created(await Todo.create(data))\n  }\n  async show({ params, response }: HttpContext) {\n    return response.ok(await Todo.findOrFail(params.id))\n  }\n  async update({ params, request, response }: HttpContext) {\n    const todo = await Todo.findOrFail(params.id)\n    todo.merge(request.only(['title', 'completed']))\n    return response.ok(await todo.save())\n  }\n  async destroy({ params, response }: HttpContext) {\n    const todo = await Todo.findOrFail(params.id)\n    await todo.delete()\n    return response.noContent()\n  }\n}<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- HTTP response helpers reference -->\n  <section class=\"s\" data-label=\"Response codes\">\n    <div class=\"kicker rise\"><span class=\"ix\">4.5<\u002Fspan> Speaking HTTP<\u002Fdiv>\n    <h2 class=\"title rise\">A method for every status code<\u002Fh2>\n    <p class=\"ptext rise d1\" style=\"max-width:none;margin-top:8px\">The <code>response<\u002Fcode> object has a named helper for each status — readable, and it sets the code for you.<\u002Fp>\n    <div class=\"row rise d2\" style=\"margin-top:24px;gap:48px;align-items:flex-start;flex:0 0 auto\">\n      <div class=\"col\">\n        <p class=\"scol-h\"><span class=\"dot\" style=\"background:#1f8a52\"><\u002Fspan>Success · 2xx<\u002Fp>\n        <div class=\"scodes\">\n          <div class=\"scode\"><span class=\"m\">response.ok()<\u002Fspan><span class=\"pill ok\">200 OK<\u002Fspan><\u002Fdiv>\n          <div class=\"scode\"><span class=\"m\">response.created()<\u002Fspan><span class=\"pill ok\">201 Created<\u002Fspan><\u002Fdiv>\n          <div class=\"scode\"><span class=\"m\">response.noContent()<\u002Fspan><span class=\"pill ok\">204 No Content<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"col\">\n        <p class=\"scol-h\"><span class=\"dot\" style=\"background:var(--danger)\"><\u002Fspan>Client &amp; server errors · 4xx / 5xx<\u002Fp>\n        <div class=\"scodes\">\n          <div class=\"scode\"><span class=\"m\">response.badRequest()<\u002Fspan><span class=\"pill err\">400 Bad Request<\u002Fspan><\u002Fdiv>\n          <div class=\"scode\"><span class=\"m\">response.unauthorized()<\u002Fspan><span class=\"pill err\">401 Unauthorized<\u002Fspan><\u002Fdiv>\n          <div class=\"scode\"><span class=\"m\">response.forbidden()<\u002Fspan><span class=\"pill err\">403 Forbidden<\u002Fspan><\u002Fdiv>\n          <div class=\"scode\"><span class=\"m\">response.notFound()<\u002Fspan><span class=\"pill err\">404 Not Found<\u002Fspan><\u002Fdiv>\n          <div class=\"scode\"><span class=\"m\">response.unprocessableEntity()<\u002Fspan><span class=\"pill err\">422 Invalid<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"ptext rise d3\" style=\"max-width:none;margin-top:18px\">A thrown <code>findOrFail()<\u002Fcode> or a failed validator becomes <b>404<\u002Fb> / <b>422<\u002Fb> automatically.<\u002Fp>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 23 · Make it green: routing -->\n  <section class=\"s\" data-label=\"Routing\">\n    <div class=\"kicker rise\"><span class=\"ix\">4.6<\u002Fspan> Routing<\u002Fdiv>\n    <h2 class=\"title rise\">Every verb — plus names &amp; groups<\u002Fh2>\n    <p class=\"ptext rise d1\" style=\"max-width:92ch;margin-top:10px\">A helper for <b>every HTTP verb<\u002Fb>; whatever the handler returns becomes JSON. Routes can be <b>named<\u002Fb> for easy URL building and <b>grouped<\u002Fb> to share a prefix or middleware.<\u002Fp>\n    <div class=\"row rise d2\" style=\"margin-top:22px;gap:46px\">\n      <div class=\"col\" style=\"flex:1\">\n        <p style=\"font-size:25px;font-weight:700;margin:0 0 10px;color:var(--ink)\">A helper for every HTTP verb<\u002Fp>\n        <div class=\"codecard sm\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\"><span class=\"path\">start/<\u002Fspan>routes.ts<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"ts\">// handler: a function or [Controller, 'method']\nrouter.get('/todos', handler)\nrouter.post('/todos', handler)\nrouter.put('/todos/:id', handler)\nrouter.patch('/todos/:id', handler)\nrouter.delete('/todos/:id', handler)\nrouter.any('/health', handler)<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"col\" style=\"flex:1\">\n        <p style=\"font-size:25px;font-weight:700;margin:0 0 10px;color:var(--ink)\">Named routes (aliases)<\u002Fp>\n        <div class=\"codecard sm\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\">routes.ts<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"ts\">router.get('/todos/:id', [Todos, 'show'])\n  .as('todos.show')\n// build it later: router.makeUrl('todos.show')<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n        <p style=\"font-size:25px;font-weight:700;margin:22px 0 10px;color:var(--ink)\">Groups — shared prefix &amp; middleware<\u002Fp>\n        <div class=\"codecard sm\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\">routes.ts<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"ts\">router.group(() =&gt; {\n  router.get('/todos', [Todos, 'index'])\n  router.post('/todos', [Todos, 'store'])\n}).prefix('/api').use(middleware.auth())<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 25 · Resourceful routes + green -->\n  <section class=\"s\" data-label=\"Resource routes\">\n    <div class=\"kicker rise\"><span class=\"ix\">4.7<\u002Fspan> Wire it up<\u002Fdiv>\n    <h2 class=\"title rise\">Five routes in one line → green<\u002Fh2>\n    <div class=\"row\" style=\"margin-top:28px\">\n      <div class=\"col rise d1\">\n        <div class=\"codecard sm\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\"><span class=\"path\">start/<\u002Fspan>routes.ts<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"ts\">const TodosController =\n  () =&gt; import('#controllers/todos_controller')\nrouter.resource('todos', TodosController)\n  .apiOnly()<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n        <div class=\"term\" style=\"margin-top:14px\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\">bash<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"bash\">npm run test\n<span class=\"ok\">  ✔ lists todos<\u002Fspan>\n<span class=\"ok\">  ✔ creates a todo<\u002Fspan>\n<span class=\"ok\">  ✔ shows a todo<\u002Fspan>\n<span class=\"ok\">  ✔ updates a todo<\u002Fspan>\n<span class=\"ok\">  ✔ deletes a todo<\u002Fspan>\n<span class=\"ok\">  5 passed (5)<\u002Fspan><\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"col rise d2\">\n        <div class=\"routes\" style=\"margin-top:0\">\n          <div class=\"rrow\"><span class=\"meth m-GET\">GET<\u002Fspan><span class=\"rpath\">/todos<\u002Fspan><span class=\"rdesc\">index<\u002Fspan><\u002Fdiv>\n          <div class=\"rrow\"><span class=\"meth m-POST\">POST<\u002Fspan><span class=\"rpath\">/todos<\u002Fspan><span class=\"rdesc\">store<\u002Fspan><\u002Fdiv>\n          <div class=\"rrow\"><span class=\"meth m-GET\">GET<\u002Fspan><span class=\"rpath\">/todos/:id<\u002Fspan><span class=\"rdesc\">show<\u002Fspan><\u002Fdiv>\n          <div class=\"rrow\"><span class=\"meth m-PUT\">PUT<\u002Fspan><span class=\"rpath\">/todos/:id<\u002Fspan><span class=\"rdesc\">update<\u002Fspan><\u002Fdiv>\n          <div class=\"rrow\"><span class=\"meth m-DELETE\">DELETE<\u002Fspan><span class=\"rpath\">/todos/:id<\u002Fspan><span class=\"rdesc\">destroy<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Factories for test data -->\n  <section class=\"s\" data-label=\"Factories\">\n    <div class=\"kicker rise\"><span class=\"ix\">4.8<\u002Fspan> Test data · factories<\u002Fdiv>\n    <h2 class=\"title rise\">Stop hand-writing test data<\u002Fh2>\n    <p class=\"ptext rise d1\" style=\"max-width:none;margin-top:12px\"><b>Model factories<\u002Fb> generate realistic records on demand — so your tests read intent, not boilerplate.<\u002Fp>\n    <div class=\"row rise d2\" style=\"margin-top:22px;gap:44px\">\n      <div class=\"col\" style=\"flex:1.22\">\n        <p style=\"font-size:25px;font-weight:700;margin:2px 0 8px;color:var(--ink)\">Define it once<\u002Fp>\n        <div class=\"term\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\">bash<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"bash\">node ace make:factory Todo<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n        <div class=\"codecard sm\" style=\"margin-top:14px\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\"><span class=\"path\">database/factories/<\u002Fspan>todo_factory.ts<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"ts\">export const TodoFactory = factory\n  .define(Todo, ({ faker }) =&gt; ({\n    title: faker.lorem.sentence(),\n    completed: false,\n  }))\n  .relation('user', () =&gt; UserFactory)\n  .build()<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"col\" style=\"flex:1\">\n        <p style=\"font-size:25px;font-weight:700;margin:2px 0 8px;color:var(--ink)\">Use it everywhere<\u002Fp>\n        <div class=\"codecard sm\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\"><span class=\"path\">tests/functional/<\u002Fspan>todos.spec.ts<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"ts\">// one row\nconst todo = await TodoFactory.create()\n\n// a whole list\nawait TodoFactory.createMany(3)\n\n// override any field\nawait TodoFactory.merge({ completed: true })\n  .create()<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n        <p class=\"ptext\" style=\"margin-top:14px;font-size:26px;max-width:none\">Backed by <b>Faker<\u002Fb> for fake titles, emails, dates — one line replaces a wall of <code>create({ … })<\u002Fcode>.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Factory in action: list several items -->\n  <section class=\"s\" data-label=\"List many\">\n    <div class=\"kicker rise\"><span class=\"ix\">4.9<\u002Fspan> Test data · in action<\u002Fdiv>\n    <h2 class=\"title rise\">Test the list with several items<\u002Fh2>\n    <p class=\"ptext rise d1\" style=\"max-width:none;margin-top:12px\">Seed a few rows with the factory, then assert the endpoint returns them all.<\u002Fp>\n    <div class=\"row rise d2\" style=\"margin-top:22px;gap:44px\">\n      <div class=\"col\" style=\"flex:1.28\">\n        <div class=\"codecard sm\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\"><span class=\"path\">tests/functional/<\u002Fspan>todos.spec.ts<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"ts\" style=\"line-height:1.34\">test('lists all todos', async ({ client, assert }) =&gt; {\n  // seed three rows in one line\n  await TodoFactory.createMany(3)\n\n  const res = await client.get('/todos')\n\n  res.assertOk()\n  assert.lengthOf(res.body(), 3)\n})<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"col\" style=\"flex:1\">\n        <p style=\"font-size:25px;font-weight:700;margin:2px 0 10px;color:var(--ink)\">Run it<\u002Fp>\n        <div class=\"term\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\">bash<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"bash\">npm run test\n<span class=\"ok\">  ✔ lists todos<\u002Fspan>\n<span class=\"ok\">  ✔ creates a todo<\u002Fspan>\n<span class=\"ok\">  ✔ shows a todo<\u002Fspan>\n<span class=\"ok\">  ✔ updates a todo<\u002Fspan>\n<span class=\"ok\">  ✔ deletes a todo<\u002Fspan>\n<span class=\"ok\">  ✔ lists all todos<\u002Fspan>\n<span class=\"ok\">  6 passed (6)<\u002Fspan><\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n        <p class=\"ptext\" style=\"margin-top:14px;font-size:26px;max-width:none\"><code>createMany(3)<\u002Fcode> fills the table; <code>res.body()<\u002Fcode> is the parsed JSON — assert on its length and contents.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 26 · DIVIDER 05 Validation -->\n  <section class=\"s dark\" data-label=\"05 Validation\">\n    <div class=\"divider\">\n      <div class=\"divtag rise\">Module 05<\u002Fdiv>\n      <div class=\"divnum rise\">05<\u002Fdiv>\n      <h2 class=\"divlabel rise d1\">Validation, test-first<\u002Fh2>\n      <p class=\"divsub rise d2\">State the rule as a test — a bad title returns a 422 — then reach for VineJS to make it true.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Meet VineJS -->\n  <section class=\"s\" data-label=\"Meet VineJS\">\n    <div class=\"kicker rise\"><span class=\"ix\">5.1<\u002Fspan> Validation<\u002Fdiv>\n    <h2 class=\"title rise\">Meet VineJS<\u002Fh2>\n    <p class=\"lead wide rise d1\" style=\"margin-top:16px;max-width:44ch\">The <b style=\"color:var(--ink)\">official AdonisJS validation library<\u002Fb> — one of the fastest in the Node ecosystem, and the gatekeeper that stops bad input before it reaches your models.<\u002Fp>\n    <div class=\"cards c2 rise d2\">\n      <div class=\"card\"><div class=\"cic\">✓<\u002Fdiv><h3>Schema-based rules<\u002Fh3><p>Describe the exact shape you expect with a fluent, chainable API — required, optional, nested and more.<\u002Fp><\u002Fdiv>\n      <div class=\"card\"><div class=\"cic\">★<\u002Fdiv><h3>Type-safe by design<\u002Fh3><p>A validated payload comes back as a fully typed object, so your controller code knows its shape.<\u002Fp><\u002Fdiv>\n      <div class=\"card\"><div class=\"cic\">⚡<\u002Fdiv><h3>Seriously fast<\u002Fh3><p>VineJS compiles each schema to optimised code, making it one of the quickest validators available.<\u002Fp><\u002Fdiv>\n      <div class=\"card\"><div class=\"cic\">⛨<\u002Fdiv><h3>Clear error reporting<\u002Fh3><p>Failures become a structured <code>422<\u002Fcode> response a client can map straight back to each field.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"qrpanel rise d3\">\n      <div class=\"qrbox\"><div class=\"qrcode\" data-qr=\"https://vinejs.dev\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"qrurl\">vinejs.dev<\u002Fdiv>\n      <div class=\"qrcap\">Scan for docs<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 27 · Test the rule first -->\n  <section class=\"s\" data-label=\"Validation test\">\n    <div class=\"kicker rise\"><span class=\"ix\">5.2<\u002Fspan> Test the rule first<\u002Fdiv>\n    <h2 class=\"title rise\">A 2-character title is a 422<\u002Fh2>\n    <div class=\"row rise d1\" style=\"margin-top:28px;gap:44px;align-items:flex-start;flex:0 0 auto\">\n      <div class=\"col\" style=\"flex:1.25\">\n        <div class=\"codecard sm\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\"><span class=\"path\">tests/functional/<\u002Fspan>todos.spec.ts<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"ts\">test('rejects a too-short title', async ({ client }) =&gt; {\n  const res = await client.post('/todos')\n    .json({ title: 'Hi' })\n\n  res.assertUnprocessableEntity()\n})<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"col\" style=\"flex:1\">\n        <p style=\"font-size:25px;font-weight:700;margin:2px 0 10px;color:var(--ink)\">Run it — red<\u002Fp>\n        <div class=\"term\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\">bash<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"bash\">npm run test\n<span class=\"bad\">  ✖ rejects a too-short title<\u002Fspan>\n<span class=\"bad\">    expected 200 to equal 422<\u002Fspan>\n<span class=\"bad\">  1 failed (1)<\u002Fspan><\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"ptext rise d2\" style=\"max-width:none;margin-top:24px\">It fails today — the todo saves with a <code>200<\u002Fcode>. To make it pass, we add a <b>validator<\u002Fb> in front of the controller.<\u002Fp>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 28 · VineJS validator -->\n  <section class=\"s\" data-label=\"VineJS\">\n    <div class=\"kicker rise\"><span class=\"ix\">5.3<\u002Fspan> Make it green · VineJS<\u002Fdiv>\n    <h2 class=\"title rise\">Describe the rules<\u002Fh2>\n    <div class=\"row\" style=\"margin-top:28px\">\n      <div class=\"col rise d1\">\n        <p style=\"font-size:25px;font-weight:700;margin:0 0 10px;color:var(--ink)\">Generate it<\u002Fp>\n        <div class=\"term\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\">bash<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"bash\">node ace make:validator todo\n<span class=\"ok\">✔ CREATE app/validators/todo.ts<\u002Fspan><\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n        <div class=\"codecard sm\" style=\"margin-top:16px\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\"><span class=\"path\">app/validators/<\u002Fspan>todo.ts<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"ts\">import vine from '@vinejs/vine'\n\nexport const createTodoValidator = vine.create({\n  title: vine.string().trim()\n    .minLength(3).maxLength(255),\n  completed: vine.boolean().optional(),\n})<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"col rise d2\">\n        <div class=\"codecard sm\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\"><span class=\"path\">app/controllers/<\u002Fspan>todos_controller.ts<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"ts\">async store({ request, response }: HttpContext) {\n  // throws 422 if invalid\n  const data = await request\n    .validateUsing(createTodoValidator)\n\n  return response.created(await Todo.create(data))\n}<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n        <p class=\"ptext\" style=\"margin-top:22px;max-width:none\">Returns a <b>fully typed<\u002Fb>, clean object. The test goes green.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 29 · DIVIDER 06 Auth -->\n  <section class=\"s dark\" data-label=\"06 Auth\">\n    <div class=\"divider\">\n      <div class=\"divtag rise\">Module 06<\u002Fdiv>\n      <div class=\"divnum rise\">06<\u002Fdiv>\n      <h2 class=\"divlabel rise d1\">Auth &amp; authorization<\u002Fh2>\n      <p class=\"divsub rise d2\">Who are you? — and what may you do? We lead with a 401 test, then a 403 test, building tokens and policies to green.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Auth guards overview -->\n  <section class=\"s\" data-label=\"Auth guards\">\n    <div class=\"kicker rise\"><span class=\"ix\">6.1<\u002Fspan> Authentication<\u002Fdiv>\n    <h2 class=\"title rise\">Three built-in guards<\u002Fh2>\n    <p class=\"ptext rise d1\" style=\"max-width:none;margin-top:8px\">A <b>guard<\u002Fb> is a strategy for authenticating requests. AdonisJS ships three — pick per app; we use <b>access tokens<\u002Fb> for our API.<\u002Fp>\n    <div class=\"cards c3 rise d2\" style=\"margin-top:30px\">\n      <div class=\"card\" style=\"position:relative;border-color:var(--violet);box-shadow:0 14px 40px -20px rgba(90,69,255,.45)\">\n        <div style=\"position:absolute;top:-15px;left:24px;background:var(--violet);color:#fff;font-size:19px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;border-radius:7px;padding:3px 12px\">notre choix<\u002Fdiv>\n        <div class=\"cic\">🔑<\u002Fdiv>\n        <h3>Access tokens<\u002Fh3>\n        <p>Opaque <code>oat_…<\u002Fcode> bearer tokens, stored hashed. For APIs, mobile &amp; SPA clients.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"cic\">🍪<\u002Fdiv>\n        <h3>Session<\u002Fh3>\n        <p>Cookie + server session — the classic choice for server-rendered web apps.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"cic\">🔐<\u002Fdiv>\n        <h3>Basic auth<\u002Fh3>\n        <p>HTTP <code>Authorization: Basic<\u002Fcode> — username &amp; password on every request.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"ptext rise d3\" style=\"max-width:none;margin-top:30px\">All three share one API — <code>auth.use('api').authenticate()<\u002Fcode> — so swapping strategies barely touches your code.<\u002Fp>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- What is an opaque token + flow -->\n  <section class=\"s\" data-label=\"Token flow\">\n    <div class=\"kicker rise\"><span class=\"ix\">6.2<\u002Fspan> Authentication<\u002Fdiv>\n    <h2 class=\"title rise\">What is an opaque token?<\u002Fh2>\n    <p class=\"lead wide rise d1\" style=\"max-width:none;margin-top:12px\">A long, <b style=\"color:var(--ink)\">random string<\u002Fb> that carries no data of its own — unlike a JWT. The server stores only its <b style=\"color:var(--ink)\">hash<\u002Fb> and looks it up on every request.<\u002Fp>\n    <div class=\"lc-flow rise d2\" style=\"margin-top:42px\">\n      <div class=\"lc-node\">\n        <span class=\"b\">1<\u002Fspan>\n        <div class=\"ic\"><svg viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M10 3H5a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h5\"><\u002Fpath><path d=\"M8.5 10h8M13.5 7l3 3-3 3\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3>Log in<\u002Fh3><p><code>POST /login<\u002Fcode> with credentials<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"lc-conn\"><svg viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 10h12M11 5l5 5-5 5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div class=\"lc-node\">\n        <span class=\"b\">2<\u002Fspan>\n        <div class=\"ic\"><svg viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"6.5\" cy=\"13.5\" r=\"3.5\"><\u002Fcircle><path d=\"M9 11l8-8M14 6l2.5 2.5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3>Issue token<\u002Fh3><p>Store the hash, return <code>oat_…<\u002Fcode> once<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"lc-conn\"><svg viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 10h12M11 5l5 5-5 5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div class=\"lc-node\">\n        <span class=\"b\">3<\u002Fspan>\n        <div class=\"ic\"><svg viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"6\" y=\"2.5\" width=\"8\" height=\"15\" rx=\"1.6\"><\u002Frect><path d=\"M9 14.5h2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3>Client stores it<\u002Fh3><p>Kept by the app or device<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"lc-conn\"><svg viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 10h12M11 5l5 5-5 5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div class=\"lc-node\">\n        <span class=\"b\">4<\u002Fspan>\n        <div class=\"ic\"><svg viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 7.5h11M11 4.5l3 3-3 3\"><\u002Fpath><path d=\"M17 12.5H6M9 9.5l-3 3 3 3\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3>Send each request<\u002Fh3><p><code>Authorization: Bearer<\u002Fcode><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"lc-conn\"><svg viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 10h12M11 5l5 5-5 5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div class=\"lc-node db\">\n        <span class=\"b\">5<\u002Fspan>\n        <div class=\"ic\"><svg viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M10 2l6 2.5v4.7c0 3.7-2.5 6.6-6 8.3-3.5-1.7-6-4.6-6-8.3V4.5L10 2Z\"><\u002Fpath><path d=\"M7.6 10l1.7 1.7L13 8\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3>Verify &amp; allow<\u002Fh3><p>Hash, look up, load the user<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"ptext rise d3\" style=\"max-width:none;margin-top:36px\">If the hash matches, the request runs as that user. If it's missing or wrong, it's a <b style=\"color:var(--danger)\">401<\u002Fb> — and because only the hash is stored, a token can be revoked instantly.<\u002Fp>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Configuring auth -->\n  <section class=\"s\" data-label=\"Auth config\">\n    <div class=\"kicker rise\"><span class=\"ix\">6.3<\u002Fspan> Authentication<\u002Fdiv>\n    <h2 class=\"title rise\">Configuring auth<\u002Fh2>\n    <p class=\"ptext rise d1\" style=\"max-width:none;margin-top:10px\">It all comes together in one file — a named <b>guard<\u002Fb> that uses tokens and points at your <b>User<\u002Fb> model.<\u002Fp>\n    <div class=\"row rise d2\" style=\"margin-top:24px;gap:46px\">\n      <div class=\"col\" style=\"flex:1.35\">\n        <div class=\"codecard sm\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\"><span class=\"path\">config/<\u002Fspan>auth.ts<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"ts\">const authConfig = defineConfig({\n  default: 'api',\n  guards: {\n    api: tokensGuard({\n      provider: tokensUserProvider({\n        tokens: 'accessTokens',\n        model: () =&gt; import('#models/user'),\n      }),\n    }),\n  },\n})\n\nexport default authConfig<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"col\" style=\"flex:1\">\n        <p style=\"font-size:25px;font-weight:700;margin:2px 0 18px;color:var(--ink)\">What each piece does<\u002Fp>\n        <p style=\"font-family:var(--mono);font-size:25px;font-weight:700;color:var(--violet-deep);margin:0 0 4px\">default: 'api'<\u002Fp>\n        <p class=\"ptext\" style=\"margin:0 0 20px;font-size:25px;max-width:none\">The guard used whenever you don't name one explicitly.<\u002Fp>\n        <p style=\"font-family:var(--mono);font-size:25px;font-weight:700;color:var(--violet-deep);margin:0 0 4px\">tokensGuard<\u002Fp>\n        <p class=\"ptext\" style=\"margin:0 0 20px;font-size:25px;max-width:none\">Reads the <code style=\"font-size:25px\">Authorization: Bearer<\u002Fcode> header and verifies the token.<\u002Fp>\n        <p style=\"font-family:var(--mono);font-size:25px;font-weight:700;color:var(--violet-deep);margin:0 0 4px\">tokensUserProvider<\u002Fp>\n        <p class=\"ptext\" style=\"margin:0;font-size:25px;max-width:none\">Resolves the user from the <code style=\"font-size:25px\">User<\u002Fcode> model and its <code style=\"font-size:25px\">accessTokens<\u002Fcode>.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 31 · The User model -->\n  <section class=\"s\" data-label=\"User model\">\n    <div class=\"kicker rise\"><span class=\"ix\">6.4<\u002Fspan> The User model<\u002Fdiv>\n    <h2 class=\"title rise\">Ships with the starter kit<\u002Fh2>\n    <div class=\"codecard sm rise d1\" style=\"margin-top:26px\">\n      <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\"><span class=\"path\">app/models/<\u002Fspan>user.ts<\u002Fspan><\u002Fdiv>\n      <pre><code data-lang=\"ts\">export default class User extends compose(UserSchema, withAuthFinder(hash)) {\n  @hasMany(() =&gt; Todo)\n  declare todos: HasMany&lt;typeof Todo&gt;\n\n  static accessTokens = DbAccessTokensProvider.forModel(User)\n}<\u002Fcode><\u002Fpre>\n    <\u002Fdiv>\n    <p class=\"ptext rise d2\" style=\"max-width:none\">It composes the generated <code>UserSchema<\u002Fcode> with the <code>withAuthFinder<\u002Fcode> mixin — which hashes passwords and adds <code>verifyCredentials<\u002Fcode>. We add the <code>todos<\u002Fcode> relationship.<\u002Fp>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 32 · Login & issue tokens -->\n  <section class=\"s\" data-label=\"Register login\">\n    <div class=\"kicker rise\"><span class=\"ix\">6.5<\u002Fspan> Register &amp; login<\u002Fdiv>\n    <h2 class=\"title rise\">Issue a token<\u002Fh2>\n    <div class=\"row rise d1\" style=\"margin-top:14px;gap:44px;align-items:flex-start;flex:0 0 auto\">\n      <div class=\"col\" style=\"flex:1.55\">\n        <p style=\"font-size:25px;font-weight:700;margin:2px 0 10px;color:var(--ink)\">The controller<\u002Fp>\n        <div class=\"codecard sm\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\"><span class=\"path\">app/controllers/<\u002Fspan>auth_controller.ts<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"ts\" style=\"line-height:1.3\">export default class AuthController {\n  async register({ request, response }: HttpContext) {\n    const data = await request\n      .validateUsing(registerValidator)\n    const user = await User.create(data)        // password hashed\n    const token = await User.accessTokens.create(user)\n    return response.created({ user, token: token.value!.release() })\n  }\n\n  async login({ request, response }: HttpContext) {\n    const { email, password } =\n      await request.validateUsing(loginValidator)\n    const user = await User.verifyCredentials(email, password)\n    const token = await User.accessTokens.create(user)\n    return response.ok({ token: token.value!.release() })\n  }\n}<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"col\" style=\"flex:1\">\n        <p style=\"font-size:25px;font-weight:700;margin:2px 0 10px;color:var(--ink)\">Two public routes<\u002Fp>\n        <div class=\"codecard sm\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\"><span class=\"path\">start/<\u002Fspan>routes.ts<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"ts\" style=\"line-height:1.4\">const AuthController = () =&gt;\n  import('#controllers/auth_controller')\n\nrouter.post('/register',\n  [AuthController, 'register'])\nrouter.post('/login',\n  [AuthController, 'login'])<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n        <p class=\"ptext\" style=\"margin-top:12px;font-size:26px;max-width:none\">No <code>auth<\u002Fcode> middleware — reachable <i>before<\u002Fi> you have a token.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"ptext rise d2\" style=\"max-width:none;margin-top:6px;font-size:24px\"><code>token.value!.release()<\u002Fcode> reveals the plain string — the <b>only<\u002Fb> moment you can read it.<\u002Fp>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Test: register -->\n  <section class=\"s\" data-label=\"Test register\">\n    <div class=\"kicker rise\"><span class=\"ix\">6.6<\u002Fspan> Register &amp; login<\u002Fdiv>\n    <h2 class=\"title rise\">Test: register returns a token<\u002Fh2>\n    <p class=\"ptext rise d1\" style=\"max-width:none;margin-top:6px\">Scaffold with <code>node ace make:test auth --suite=functional<\u002Fcode>, then describe the endpoint.<\u002Fp>\n    <div class=\"row rise d2\" style=\"margin-top:18px;flex:0 0 auto\">\n      <div class=\"col\" style=\"flex:1\">\n        <div class=\"codecard sm\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\"><span class=\"path\">tests/functional/<\u002Fspan>auth.spec.ts<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"ts\" style=\"line-height:1.32\">test('registers and returns a token', async ({ client, assert }) =&gt; {\n  const payload = {\n    fullName: 'John Doe',\n    email: 'john.doe@example.com',\n    password: 'password123',\n    passwordConfirmation: 'password123',\n  }\n  const response = await client.post('/register').json(payload)\n  response.assertCreated()\n  response.assertBodyContains({ user: { fullName: payload.fullName } })\n  assert.isNotEmpty(response.body().token)\n})<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Test: login -->\n  <section class=\"s\" data-label=\"Test login\">\n    <div class=\"kicker rise\"><span class=\"ix\">6.7<\u002Fspan> Register &amp; login<\u002Fdiv>\n    <h2 class=\"title rise\">Test: login returns a token<\u002Fh2>\n    <div class=\"row rise d1\" style=\"margin-top:22px;gap:48px;align-items:flex-start;flex:0 0 auto\">\n      <div class=\"col\" style=\"flex:1.5\">\n        <div class=\"codecard sm\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\"><span class=\"path\">tests/functional/<\u002Fspan>auth.spec.ts<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"ts\" style=\"line-height:1.32\">test('login and return a token',\n  async ({ client, assert }) =&gt; {\n  const password = 'password123'\n  const user = await UserFactory\n    .merge({ password }).create()\n\n  const response = await client\n    .post('/login')\n    .json({ email: user.email, password })\n\n  response.assertOk()\n  assert.isNotEmpty(response.body().token)\n}).pin()<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"col\" style=\"flex:1\">\n        <p style=\"font-size:25px;font-weight:700;margin:2px 0 10px;color:var(--ink)\">Seed with a factory<\u002Fp>\n        <p class=\"ptext\" style=\"margin:0 0 20px;font-size:27px;max-width:none\"><code>UserFactory.merge({ password })<\u002Fcode> creates a real user so we can log in as them.<\u002Fp>\n        <p style=\"font-size:25px;font-weight:700;margin:2px 0 10px;color:var(--ink)\">Focus one test<\u002Fp>\n        <p class=\"ptext\" style=\"margin:0;font-size:27px;max-width:none\"><code>.pin()<\u002Fcode> runs <b>only<\u002Fb> this test — handy while iterating on a single endpoint.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 33 · Test the lock first -> protect -->\n  <section class=\"s\" data-label=\"Protect routes\">\n    <div class=\"kicker rise\"><span class=\"ix\">6.8<\u002Fspan> Protecting routes<\u002Fdiv>\n    <h2 class=\"title rise\">Test the lock, then build it<\u002Fh2>\n    <div class=\"row\" style=\"margin-top:28px\">\n      <div class=\"col rise d1\">\n        <div class=\"codecard sm\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\"><span class=\"path\">tests/functional/<\u002Fspan>todos.spec.ts<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"ts\" style=\"line-height:1.3\">test('rejects anonymous', async ({ client }) =&gt; {\n  const res = await client.get('/todos')\n  res.assertUnauthorized()\n})\n\ntest('creates a todo when authenticated',\n  async ({ client }) =&gt; {\n  const user = await UserFactory.create()\n  const res = await client\n    .post('/todos')\n    .json({ title: 'Buy milk' })\n    .loginAs(user)\n  res.assertCreated()\n})<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n        <p class=\"ptext\" style=\"margin-top:18px;max-width:none\"><code>.loginAs(user)<\u002Fcode> authenticates the request <b>as that user<\u002Fb> — no real login round-trip needed.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"col rise d2\">\n        <div class=\"codecard sm\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\"><span class=\"path\">start/<\u002Fspan>routes.ts<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"ts\">router.group(() =&gt; {\n  router.resource('todos', TodosController)\n    .apiOnly()\n}).use(middleware.auth({ guards: ['api'] }))<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n        <p class=\"ptext\" style=\"margin-top:22px\">Inside, <code>auth.getUserOrFail()<\u002Fcode> scopes todos to that user.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 34 · AuthN vs AuthZ -->\n  <section class=\"s\" data-label=\"AuthN vs AuthZ\">\n    <div class=\"kicker rise\"><span class=\"ix\">6.9<\u002Fspan> Authorization<\u002Fdiv>\n    <h2 class=\"title rise\">Authentication vs authorization<\u002Fh2>\n    <div class=\"cards c2 rise d1\" style=\"margin-top:40px\">\n      <div class=\"card\"><div class=\"cic\">🔑<\u002Fdiv><h3>Authentication — <span style=\"color:var(--violet-deep)\">401<\u002Fspan><\u002Fh3><p style=\"font-size:24px\">\"Who are you?\" The <code>auth<\u002Fcode> middleware checks you are <b style=\"color:var(--ink)\">logged in<\u002Fb>. No valid token → 401.<\u002Fp><\u002Fdiv>\n      <div class=\"card\"><div class=\"cic\">⛨<\u002Fdiv><h3>Authorization — <span style=\"color:var(--danger)\">403<\u002Fspan><\u002Fh3><p style=\"font-size:24px\">\"Are you allowed?\" A policy checks you may do <b style=\"color:var(--ink)\">this specific thing<\u002Fb>. Not permitted → 403.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"ptext rise d2\" style=\"max-width:none\">Deleting <b>someone else's<\u002Fb> todo while logged in is a <code>403<\u002Fcode>, not a <code>401<\u002Fcode>. APIs need both layers.<\u002Fp>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 35 · Test ownership first -> policy -->\n  <section class=\"s\" data-label=\"Bouncer\">\n    <div class=\"kicker rise\"><span class=\"ix\">6.10<\u002Fspan> Owner-only with Bouncer<\u002Fdiv>\n    <h2 class=\"title rise\">Test ownership first<\u002Fh2>\n    <p class=\"ptext rise d1\" style=\"max-width:none;margin-top:8px\">Two red tests pin the rule: the <b>owner<\u002Fb> can delete (204), an <b>intruder<\u002Fb> cannot (403).<\u002Fp>\n    <div class=\"row rise d2\" style=\"margin-top:18px;flex:0 0 auto\">\n      <div class=\"col\" style=\"flex:1\">\n        <div class=\"codecard sm\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\"><span class=\"path\">tests/functional/<\u002Fspan>todos.spec.ts<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"ts\" style=\"line-height:1.3\">test('owner-only delete', async ({ client }) =&gt; {\n  const owner = await UserFactory.create()\n  const todo = await TodoFactory.merge({ userId: owner.id }).create()\n  const res = await client.delete(`/todos/${todo.id}`).loginAs(owner)\n  res.assertNoContent()\n})\n\ntest('owner-only delete (intruder)', async ({ client }) =&gt; {\n  const intruder = await UserFactory.create()\n  const todo = await TodoFactory.create()\n  const res = await client.delete(`/todos/${todo.id}`).loginAs(intruder)\n  res.assertForbidden()\n})<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- What is Bouncer + install -->\n  <section class=\"s\" data-label=\"Bouncer intro\">\n    <div class=\"kicker rise\"><span class=\"ix\">6.11<\u002Fspan> Owner-only with Bouncer<\u002Fdiv>\n    <h2 class=\"title rise\">Meet Bouncer<\u002Fh2>\n    <p class=\"ptext rise d1\" style=\"max-width:none;margin-top:8px\">AdonisJS's official authorization layer. You write <b>abilities<\u002Fb> (inline checks) and <b>policies<\u002Fb> (a class per model), then ask <code>bouncer<\u002Fcode> \"can this user do X?\" — it answers <code>true<\u002Fcode>/<code>false<\u002Fcode> or throws a <code>403<\u002Fcode>.<\u002Fp>\n    <div class=\"row rise d2\" style=\"margin-top:26px;gap:48px;align-items:flex-start;flex:0 0 auto\">\n      <div class=\"col\" style=\"flex:1.25\">\n        <p style=\"font-size:25px;font-weight:700;margin:2px 0 10px;color:var(--ink)\">Install &amp; configure<\u002Fp>\n        <div class=\"term\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\">bash<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"bash\">node ace add @adonisjs/bouncer\n<span class=\"ok\">✔ installs the package<\u002Fspan>\n<span class=\"ok\">✔ registers provider &amp; middleware<\u002Fspan>\n<span class=\"ok\">✔ CREATE app/abilities/main.ts<\u002Fspan>\n<span class=\"ok\">✔ CREATE app/policies/main.ts<\u002Fspan><\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n        <p class=\"ptext\" style=\"margin-top:16px;max-width:none\">One command wires the provider, the <code>initialize_bouncer<\u002Fcode> middleware, and the <code>abilities<\u002Fcode>/<code>policies<\u002Fcode> folders.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"col\" style=\"flex:1\">\n        <p style=\"font-size:25px;font-weight:700;margin:2px 0 10px;color:var(--ink)\">Two ways to authorize<\u002Fp>\n        <div class=\"cards c1\" style=\"gap:16px;margin-top:4px\">\n          <div class=\"card\" style=\"padding:20px 22px\"><div class=\"card-t\" style=\"font-size:26px\">Abilities<\u002Fdiv><div class=\"card-d\" style=\"font-size:23px\">Quick inline closures in <code>abilities/main.ts<\u002Fcode> — great for one-off checks.<\u002Fdiv><\u002Fdiv>\n          <div class=\"card\" style=\"padding:20px 22px\"><div class=\"card-t\" style=\"font-size:26px\">Policies<\u002Fdiv><div class=\"card-d\" style=\"font-size:23px\">A class per resource (<code>TodoPolicy<\u002Fcode>) grouping all its rules — what we'll use.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Write the policy -->\n  <section class=\"s\" data-label=\"Write policy\">\n    <div class=\"kicker rise\"><span class=\"ix\">6.12<\u002Fspan> Owner-only with Bouncer<\u002Fdiv>\n    <h2 class=\"title rise\">Write the policy<\u002Fh2>\n    <p class=\"ptext rise d1\" style=\"max-width:none;margin-top:8px\">Generate a class for the resource, then encode the rule. Each method returns a boolean: <code>true<\u002Fcode> allows, <code>false<\u002Fcode> denies.<\u002Fp>\n    <div class=\"row rise d2\" style=\"margin-top:22px;gap:48px;align-items:flex-start;flex:0 0 auto\">\n      <div class=\"col\" style=\"flex:1\">\n        <p style=\"font-size:25px;font-weight:700;margin:2px 0 10px;color:var(--ink)\">Generate it<\u002Fp>\n        <div class=\"term\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\">bash<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"bash\">node ace make:policy Todo\n<span class=\"ok\">✔ CREATE app/policies/todo_policy.ts<\u002Fspan><\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n        <p class=\"ptext\" style=\"margin-top:16px;max-width:none\">Bouncer auto-discovers policies, so the class is ready to use immediately.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"col\" style=\"flex:1.2\">\n        <p style=\"font-size:25px;font-weight:700;margin:2px 0 10px;color:var(--ink)\">Encode the rule<\u002Fp>\n        <div class=\"codecard sm\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\"><span class=\"path\">app/policies/<\u002Fspan>todo_policy.ts<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"ts\">export default class TodoPolicy extends BasePolicy {\n  delete(user: User, todo: Todo) {\n    return user.id === todo.userId\n  }\n}<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Enforce the policy in the controller -->\n  <section class=\"s\" data-label=\"Enforce policy\">\n    <div class=\"kicker rise\"><span class=\"ix\">6.13<\u002Fspan> Owner-only with Bouncer<\u002Fdiv>\n    <h2 class=\"title rise\">Enforce it in the controller<\u002Fh2>\n    <p class=\"ptext rise d1\" style=\"max-width:none;margin-top:8px\">Call <code>bouncer<\u002Fcode> before the destructive action. If the policy returns <code>false<\u002Fcode>, it throws a clean <b>403<\u002Fb> and the row is never touched.<\u002Fp>\n    <div class=\"codecard sm rise d2\" style=\"margin-top:22px\">\n      <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\"><span class=\"path\">app/controllers/<\u002Fspan>todos_controller.ts<\u002Fspan><\u002Fdiv>\n      <pre><code data-lang=\"ts\">async destroy({ params, bouncer, response }: HttpContext) {\n  const todo = await Todo.findOrFail(params.id)\n\n  // 403 unless this user owns the todo\n  await bouncer.with(TodoPolicy).authorize('delete', todo)\n\n  await todo.delete()\n  return response.noContent()\n}<\u002Fcode><\u002Fpre>\n    <\u002Fdiv>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 36 · DIVIDER 07 Wrap -->\n  <section class=\"s dark\" data-label=\"07 Wrap\">\n    <div class=\"divider\">\n      <div class=\"divtag rise\">Module 07<\u002Fdiv>\n      <div class=\"divnum rise\">07<\u002Fdiv>\n      <h2 class=\"divlabel rise d1\">Wrap-up<\u002Fh2>\n      <p class=\"divsub rise d2\">From an empty folder to an authenticated REST API — with a green suite that grew alongside it.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 37 · Finished API + green suite -->\n  <section class=\"s\" data-label=\"Finished API\">\n    <div class=\"kicker rise\"><span class=\"ix\">7.1<\u002Fspan> The finished API<\u002Fdiv>\n    <h2 class=\"title rise\">Every feature is green<\u002Fh2>\n    <div class=\"row\" style=\"margin-top:28px\">\n      <div class=\"col rise d1\">\n        <div class=\"routes\" style=\"margin-top:0\">\n          <div class=\"rrow\"><span class=\"meth m-POST\">POST<\u002Fspan><span class=\"rpath\">/register<\u002Fspan><\u002Fdiv>\n          <div class=\"rrow\"><span class=\"meth m-POST\">POST<\u002Fspan><span class=\"rpath\">/login<\u002Fspan><\u002Fdiv>\n          <div class=\"rrow\"><span class=\"meth m-GET\">GET<\u002Fspan><span class=\"rpath\">/todos<\u002Fspan><\u002Fdiv>\n          <div class=\"rrow\"><span class=\"meth m-POST\">POST<\u002Fspan><span class=\"rpath\">/todos<\u002Fspan><\u002Fdiv>\n          <div class=\"rrow\"><span class=\"meth m-PUT\">PUT<\u002Fspan><span class=\"rpath\">/todos/:id<\u002Fspan><\u002Fdiv>\n          <div class=\"rrow\"><span class=\"meth m-DELETE\">DELETE<\u002Fspan><span class=\"rpath\">/todos/:id<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"col rise d2\">\n        <div class=\"term\" style=\"margin-top:0\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\">node ace test<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"bash\"><span class=\"ok\">  ✔ the server is alive<\u002Fspan>\n<span class=\"ok\">  ✔ lists todos<\u002Fspan>\n<span class=\"ok\">  ✔ creates a todo<\u002Fspan>\n<span class=\"ok\">  ✔ rejects a too-short title<\u002Fspan>\n<span class=\"ok\">  ✔ rejects anonymous<\u002Fspan>\n<span class=\"ok\">  ✔ owner-only delete<\u002Fspan>\n\n<span class=\"ok\">PASSED · 6 passed (6)<\u002Fspan><\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"ptext rise d3\" style=\"max-width:64ch\">Because we led with tests, the suite tells the whole story of the API — auth, the happy path, validation and authorization.<\u002Fp>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 38 · Where to go next -->\n  <section class=\"s\" data-label=\"Next steps\">\n    <div class=\"kicker rise\"><span class=\"ix\">7.2<\u002Fspan> Where to go next<\u002Fdiv>\n    <h2 class=\"title rise\">Take it further<\u002Fh2>\n    <ul class=\"bullets rise d1\" style=\"margin-top:40px\">\n      <li><b>Pagination &amp; filtering<\u002Fb> — add <code>.paginate(page, limit)<\u002Fcode> (write the test first!)<\u002Fli>\n      <li><b>Token abilities<\u002Fb> — issue read-only tokens with scopes<\u002Fli>\n      <li><b>Rate limiting &amp; CORS<\u002Fb> — both first-party, a few lines each<\u002Fli>\n      <li><b>Deploy<\u002Fb> — <code>node ace build<\u002Fcode>, ship to any Node 24 host<\u002Fli>\n    <\u002Ful>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 39 · Closing -->\n  <section class=\"s dark\" data-label=\"Thanks\">\n    <div class=\"hero\">\n      <div class=\"eyebrow rise\"><span class=\"biglogo\">A<\u002Fspan> That's a wrap<\u002Fdiv>\n      <h1 class=\"htitle rise d1\">You built it<br><span class=\"accent\">test-first.<\u002Fspan><\u002Fh1>\n      <p class=\"hsub rise d2\">Routes, controllers, models, validators, guards and policies — each led by a test, all backed by a green suite.<\u002Fp>\n      <div class=\"meta rise d3\">\n        <span class=\"chip\">docs.adonisjs.com<\u002Fspan>\n        <span class=\"chip\">lucid.adonisjs.com<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdeck-stage>\n\n<script src=\"7ce2401a-d198-48b5-9b88-07e6c948c2e8\"><\u002Fscript>\n<script>\n  document.querySelectorAll('pre code[data-lang]').forEach((el) => {\n    const raw = el.textContent;\n    const lang = el.getAttribute('data-lang');\n    if (el.children.length === 0) {\n      el.innerHTML = window.hlCode(raw, lang);\n    } else {\n      el.childNodes.forEach((node) => {\n        if (node.nodeType === 3 && node.textContent.trim()) {\n          const span = document.createElement('span');\n          span.innerHTML = window.hlCode(node.textContent, lang);\n          node.replaceWith(span);\n        }\n      });\n    }\n  });\n<\u002Fscript>\n<script src=\"e0fedc79-58c3-40bd-85e2-b90fb5d20640\"><\u002Fscript>\n<script>\n  (function () {\n    function drawQR() {\n      if (!window.QRCode) return;\n      document.querySelectorAll('.qrcode[data-qr]').forEach(function (el) {\n        if (el.dataset.qrDone) return;\n        el.innerHTML = '';\n        new QRCode(el, { text: el.getAttribute('data-qr'), width: 528, height: 528, colorDark: '#14111f', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.M });\n        el.dataset.qrDone = '1';\n      });\n    }\n    function stampPageNumbers() {\n      var secs = document.querySelectorAll('deck-stage > section');\n      var total = secs.length;\n      secs.forEach(function (s, i) {\n        if (s.querySelector(':scope > .pageno')) return;\n        var d = document.createElement('div');\n        d.className = 'pageno';\n        d.textContent = (i + 1) + ' / ' + total;\n        s.appendChild(d);\n      });\n    }\n    function addCopyButtons() {\n      var COPY = '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"9\" y=\"9\" width=\"13\" height=\"13\" rx=\"2\"><\u002Frect><path d=\"M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1\"><\u002Fpath><\u002Fsvg>';\n      var CHECK = '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>';\n      document.querySelectorAll('.codecard, .term').forEach(function (card) {\n        var head = card.querySelector('.cc-head');\n        var code = card.querySelector('pre code');\n        if (!head || !code || head.querySelector('.cc-copy')) return;\n        var btn = document.createElement('button');\n        btn.type = 'button';\n        btn.className = 'cc-copy';\n        btn.innerHTML = COPY + '<span>Copy<\u002Fspan>';\n        btn.addEventListener('click', function (e) {\n          e.stopPropagation();\n          var text = code.innerText.replace(/\\u00a0/g, ' ');\n          var done = function () {\n            btn.classList.add('copied');\n            btn.innerHTML = CHECK + '<span>Copied<\u002Fspan>';\n            clearTimeout(btn._t);\n            btn._t = setTimeout(function () {\n              btn.classList.remove('copied');\n              btn.innerHTML = COPY + '<span>Copy<\u002Fspan>';\n            }, 1600);\n          };\n          if (navigator.clipboard && navigator.clipboard.writeText) {\n            navigator.clipboard.writeText(text).then(done).catch(function () { fallback(text); done(); });\n          } else { fallback(text); done(); }\n        });\n        head.appendChild(btn);\n      });\n      function fallback(text) {\n        var ta = document.createElement('textarea');\n        ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';\n        document.body.appendChild(ta); ta.select();\n        try { document.execCommand('copy'); } catch (e) {}\n        document.body.removeChild(ta);\n      }\n    }\n    function init() { drawQR(); stampPageNumbers(); addCopyButtons(); }\n    if (document.readyState !== 'loading') init();\n    else document.addEventListener('DOMContentLoaded', init);\n  })();\n<\u002Fscript>\n<script src=\"c9af5c92-2d13-41fb-9cef-1a22b9b7b8ca\"><\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"AdonisJS 7 Slides"}
