document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // Per-page prep: substitute UUIDs, strip SRI/crossorigin (blob URLs from a
    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {
      var map = {};
      var list = extResources[id] || [];
      for (var k = 0; k < list.length; k++) {
        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];
      }
      return map;
    }
    for (const id of pageIds) {
      let t = pages[id];
      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);
      t = t.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.
      // composedPath + getAttribute('target') handle SVG <a> and shadow-DOM
      // anchors, which closest()/IDL .target get wrong.
      var headContent = 'window.__resources = ' + JSON.stringify(resourcesFor(id)) + ';' +
        (pageIds.length > 1 ?
          'window.__bundler_pages = ' + JSON.stringify(pageIds) + ';' +
          'document.addEventListener("click", function(e){' +
            'if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.defaultPrevented) return;' +
            'var a = null, p = e.composedPath ? e.composedPath() : [e.target];' +
            'for (var j = 0; j < p.length && !a; j++) {' +

              'if (tn === "A" || tn === "a" || tn === "AREA") a = n;' +
            '}' +
            'if (!a && e.target.closest) a = e.target.closest("a, area");' +
            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +
              'if (!tg) { var b = document.querySelector("base[target]"); if (b && b.getAttribute("target") !== "_self") return; }' +
              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');
      // Defuse any script end-tag sequence in the content (resource ids, page
      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.
      var headOpen = t.match(/<head[^>]*>/i);
      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).
      var template = pages[entryId];
      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  deck-stage:not(:defined) { visibility: hidden; }\n  :root {\n    --violet: #6a55ff; --violet-2: #8b78ff; --violet-deep: #4a36e8;\n    --ink: #17131f; --ink-2: #45404f; --muted: #79748a; --faint: #a8a3b6;\n    --line: #e8e5f1; --paper: #ffffff; --canvas: #f6f4fc;\n    --code-bg: #14111e; --code-head: #221d2e; --code-text: #e9e5f5;\n    --dark: #14111f; --dark-2: #1c1733;\n    --ok: #43c47a; --warn: #e2a13a; --danger: #ff6b80;\n    --t-cm:#7b7596; --t-st:#9be3a8; --t-kw:#c7adff; --t-lit:#ff95c0; --t-ty:#ffd479;\n    --t-fn:#86c6ff; --t-nu:#ffb07a; --t-de:#ff95c0; --t-al:#74e0c8; --t-key:#86c6ff;\n    --t-cmd:#9be3a8; --t-fl:#ffb07a; --t-pu:#bdb7cf;\n    --sans:'Hanken Grotesk',system-ui,sans-serif; --mono:'JetBrains Mono',monospace;\n  }\n  * { box-sizing: border-box; }\n  body { margin: 0; background: #0a0810; }\n\n  /* base slide */\n  section.s {\n    font-family: var(--sans); background: var(--canvas); color: var(--ink);\n    padding: 92px 110px; display: flex; flex-direction: column; overflow: hidden;\n  }\n  section.s * { box-sizing: border-box; }\n\n  .kicker {\n    font-size: 26px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;\n    color: var(--violet-deep); display: flex; align-items: center; gap: 14px; margin-bottom: 26px;\n  }\n  .kicker .ix { font-family: var(--mono); font-weight: 600; background: #e7e1ff; color: var(--violet-deep); padding: 3px 11px; border-radius: 8px; font-size: 24px; }\n  .title { font-size: 66px; line-height: 1.05; letter-spacing: -.025em; font-weight: 800; margin: 0; }\n  .lead { font-size: 33px; line-height: 1.45; color: var(--muted); font-weight: 400; margin: 26px 0 0; max-width: 30ch; }\n  .lead.wide { max-width: 40ch; }\n\n  /* brand footer */\n  .brandmark {\n    position: absolute; left: 110px; bottom: 54px; display: flex; align-items: center; gap: 13px;\n    font-size: 24px; font-weight: 700; color: var(--faint); letter-spacing: -.01em;\n  }\n  .brandmark .lg { width: 36px; height: 36px; border-radius: 9px; background: linear-gradient(150deg,var(--violet),var(--violet-2)); color:#fff; display:grid; place-items:center; font-weight:800; font-size:24px; }\n\n  /* bullets */\n  .bullets { list-style: none; margin: 36px 0 0; padding: 0; display: flex; flex-direction: column; gap: 22px; }\n  .bullets li { font-size: 31px; line-height: 1.4; color: var(--ink-2); padding-left: 42px; position: relative; max-width: 32ch; }\n  .bullets li::before { content:''; position:absolute; left:6px; top:14px; width:14px; height:14px; border-radius:4px; background:var(--violet); }\n  .bullets li b { color: var(--ink); font-weight: 700; }\n  code, .mono { font-family: var(--mono); }\n  .bullets code, .lead code, .ptext code { font-family: var(--mono); font-size: .82em; background:#ece8fb; color:var(--violet-deep); padding:1px 8px; border-radius:6px; font-weight:500; }\n\n  .ptext { font-size: 30px; line-height: 1.5; color: var(--ink-2); margin: 28px 0 0; max-width: 34ch; }\n  .ptext b { color: var(--ink); font-weight: 700; }\n\n  /* layout helpers */\n  .row { display: flex; gap: 56px; flex: 1; min-height: 0; align-items: flex-start; }\n  .row.center { align-items: center; }\n  .col { flex: 1; min-width: 0; }\n  .grow { flex: 1; min-height: 0; display: flex; flex-direction: column; }\n\n  /* code card */\n  .codecard { background: var(--code-bg); border: 1px solid #2c2742; border-radius: 18px; overflow: hidden; box-shadow: 0 30px 70px -30px rgba(40,28,90,.5); }\n  .cc-head { display: flex; align-items: center; gap: 12px; padding: 16px 22px; background: var(--code-head); border-bottom: 1px solid #2c2742; }\n  .cc-dots { display: flex; gap: 8px; }\n  .cc-dots i { width: 14px; height: 14px; border-radius: 50%; }\n  .cc-file { font-family: var(--mono); font-size: 24px; color: #b6afc9; font-weight: 500; }\n  .cc-file .path { color: #756e8c; }\n  .cc-tag { margin-left:auto; font-family: var(--mono); font-size: 20px; font-weight: 600; letter-spacing:.04em; text-transform: uppercase; color:#cdb8ff; background: rgba(124,92,255,.18); padding: 4px 12px; border-radius: 7px; }\n  .cc-copy { margin-left:auto; display:inline-flex; align-items:center; gap:7px; font-family: var(--mono); font-size:19px; font-weight:600; letter-spacing:.03em; color:#cdb8ff; background: rgba(124,92,255,.16); border:1px solid rgba(124,92,255,.3); padding:5px 13px; border-radius:8px; cursor:pointer; transition: background .15s, color .15s, border-color .15s; -webkit-user-select:none; user-select:none; }\n  .cc-copy:hover { background: rgba(124,92,255,.32); color:#fff; }\n  .cc-copy svg { width:17px; height:17px; }\n  .cc-copy.copied { color:#9be8b6; border-color: rgba(40,200,120,.5); background: rgba(40,200,120,.16); }\n  .cc-tag + .cc-copy { margin-left:12px; }\n  /* speaker slide */\n  .speaker-photo { position: relative; width: 440px; height: 440px; flex: 0 0 auto; }\n  .speaker-photo::before { content:''; position:absolute; inset:-14px; border-radius:50%; background: conic-gradient(from 140deg, var(--violet), var(--violet-2), #c9bcff, var(--violet)); opacity:.9; }\n  .speaker-photo::after { content:''; position:absolute; inset:-30px; border-radius:50%; border:2px dashed rgba(106,85,255,.28); }\n  .speaker-photo img { position:relative; width:440px; height:440px; object-fit:cover; object-position:center 30%; border-radius:50%; border:6px solid var(--canvas); box-shadow:0 30px 60px -28px rgba(40,28,90,.5); }\n  .speaker-list { display:flex; flex-direction:column; border-top:1px solid var(--line); }\n  .speaker-list div { padding:15px 0; border-bottom:1px solid var(--line); font-size:27px; color:var(--ink-2); }\n  .speaker-list b { color:var(--ink); font-weight:700; }\n  .speaker-pills { display:flex; gap:14px; margin-top:6px; flex-wrap:wrap; }\n  .spill { display:inline-flex; align-items:center; font-family:var(--mono); font-size:24px; font-weight:600; color:var(--violet-deep); background:#ece8fb; border:1px solid rgba(106,85,255,.32); border-radius:10px; padding:8px 16px; }\n  /* title-slide QR */\n  .title-qr { position:absolute; right:84px; bottom:72px; display:flex; align-items:center; gap:20px; }\n  .title-qr .qrbox { width:140px; height:140px; padding:10px; box-sizing:border-box; }\n  .title-qr .qrbox > div { width:120px; height:120px; }\n  .title-qr .qrcode canvas, .title-qr .qrcode img { width:120px !important; height:120px !important; }\n  .title-qr-text { text-align:right; }\n  .title-qr-cap { font-size:24px; color:rgba(255,255,255,.62); font-weight:500; }\n  .title-qr-url { font-family:var(--mono); font-size:25px; font-weight:700; color:#cdb8ff; letter-spacing:-.01em; margin-top:3px; }\n  .codecard pre { margin: 0; padding: 26px 30px; overflow: hidden; }\n  .codecard code { font-family: var(--mono); font-size: 27px; line-height: 1.6; color: var(--code-text); white-space: pre; display: block; }\n  .codecard.sm code { font-size: 24px; line-height: 1.55; }\n  .codecard.lg code { font-size: 30px; line-height: 1.62; }\n\n  /* terminal */\n  .term { background:#100d18; border:1px solid #2a2440; border-radius:18px; overflow:hidden; box-shadow: 0 30px 70px -30px rgba(40,28,90,.5); }\n  .term .cc-head { background:#1a1626; }\n  .term pre { margin:0; padding: 28px 32px; }\n  .term code { font-family: var(--mono); font-size: 26px; line-height: 1.7; white-space: pre; display:block; color:#cfc9e0; }\n  .term .pr { color: var(--violet-2); font-weight: 700; }\n  .term .ok { color: #6fd98a; }\n  .term .bad { color: #ff8095; }\n  .term .cmt { color: #6a6480; font-style: italic; }\n\n  /* token colors */\n  .t-cm{color:var(--t-cm);font-style:italic} .t-st{color:var(--t-st)} .t-kw{color:var(--t-kw)}\n  .t-lit{color:var(--t-lit)} .t-ty{color:var(--t-ty)} .t-fn{color:var(--t-fn)} .t-nu{color:var(--t-nu)}\n  .t-de{color:var(--t-de)} .t-al{color:var(--t-al)} .t-key{color:var(--t-key)} .t-cmd{color:var(--t-cmd);font-weight:600}\n  .t-fl{color:var(--t-fl)} .t-pu{color:var(--t-pu)}\n\n  /* cards grid */\n  .cards { display: grid; gap: 24px; margin-top: 38px; }\n  .cards.c2 { grid-template-columns: 1fr 1fr; }\n  .cards.c3 { grid-template-columns: repeat(3,1fr); }\n  .card { background: var(--paper); border: 1px solid var(--line); border-radius: 18px; padding: 30px 30px; box-shadow: 0 8px 26px -16px rgba(40,28,90,.3); }\n  .card .cic { width: 60px; height: 60px; border-radius: 14px; background: #ece7ff; color: var(--violet-deep); display: grid; place-items: center; margin-bottom: 20px; font-size: 30px; line-height: 1; }\n  .card .cic svg { width: 30px; height: 30px; }\n  .card.good .cic { background: #e2f6ea; color: #2c9a5d; }\n  .card.bad .cic { background: #ffe7eb; color: #d23b54; }\n  .card h3 { margin: 0 0 8px; font-size: 28px; font-weight: 700; letter-spacing: -.01em; }\n  .card p { margin: 0; font-size: 24px; line-height: 1.45; color: var(--muted); }\n  .card p code { font-family: var(--mono); font-size: 1em; color: var(--violet-deep); }\n\n  /* routes table */\n  .routes { margin-top: 30px; border: 1px solid var(--line); border-radius: 18px; overflow: hidden; background: var(--paper); box-shadow: 0 10px 30px -18px rgba(40,28,90,.3); }\n  .rrow { display: flex; align-items: center; gap: 26px; padding: 19px 30px; }\n  .rrow + .rrow { border-top: 1px solid #efedf7; }\n  .meth { font-family: var(--mono); font-weight: 700; font-size: 24px; color:#fff; padding: 6px 16px; border-radius: 8px; min-width: 116px; text-align: center; }\n  .m-GET{background:#34a45f} .m-POST{background:var(--violet)} .m-PUT{background:#d18a1e} .m-DELETE{background:#d7415a}\n  .rpath { font-family: var(--mono); font-size: 27px; font-weight: 600; flex: 1; }\n  .rdesc { font-size: 24px; color: var(--muted); }\n\n  /* stat chips */\n  .stats { display: flex; gap: 26px; margin-top: 36px; }\n  .stat { flex: 1; background: var(--paper); border: 1px solid var(--line); border-radius: 18px; padding: 28px 30px; box-shadow: 0 8px 26px -16px rgba(40,28,90,.3); }\n  .stat .n { fon uccess / green callout */\n  .greenbox { display: flex; align-items: center; gap: 18px; margin-top: 20px; padding: 20px 26px; background: #e7f6ec; border: 2px solid #1f8a52; border-left: 9px solid #1f8a52; border-radius: 13px; }\n  .greenbox svg { flex: none; width: 42px; height: 42px; color: #1f8a52; }\n  .greenbox p { margin: 0; font-size: 27px; line-height: 1.38; color: #14532b; max-width: none; }\n  .greenbox b { color: #1f8a52; font-weight: 800; }\n\n  /* HTTP response method reference */\n  .scol-h { display: flex; align-items: center; gap: 11px; font-size: 26px; font-weight: 800; color: var(--ink); margin: 0 0 14px; }\n  .scol-h .dot { width: 13px; height: 13px; border-radius: 50%; flex: none; }\n  .scodes { display: flex; flex-direction: column; gap: 9px; }\n  .scode { display: flex; align-items: center; gap: 16px; background: var(--paper); border: 1px solid var(--line); border-radius: 12px; padding: 10px 18px; }\n  .scode .m { font-family: var(--mono); font-size: 25px; font-weight: 700; color: var(--violet-deep); flex: 1; min-width: 0; }\n  .scode .pill { font-family: var(--mono); font-size: 24px; font-weight: 700; border-radius: 8px; padding: 4px 13px; flex: none; white-space: nowrap; }\n  .scode .pill.ok { background: #e7f6ec; color: #1f8a52; }\n  .scode .pill.err { background: #fdeceb; color: var(--danger); }\n\n  .extdesc { font-size: 24px; color: var(--ink-2); margin-top: 7px; line-height: 1.35; }\n\n  /* Firefox JSON viewer mock */\n  .jsonview { border-radius: 12px; overflow: hidden; background: #0e1116; border: 1px solid #2a2f3a; font-family: var(--mono); box-shadow: 0 12px 30px -18px rgba(0,0,0,.6); }\n  .jv-tabs { display: flex; gap: 28px; padding: 10px 20px 0; background: #1a1d24; font-size: 23px; color: #9aa3b2; }\n  .jv-tabs .on { color: #fff; font-weight: 700; border-bottom: 3px solid #4a8cff; padding-bottom: 9px; }\n  .jv-tabs span:not(.on) { padding-bottom: 9px; }\n  .jv-tools { display: flex; align-items: center; gap: 14px; padding: 11px 18px; background: #24272e; border-top: 1px solid #0e1116; }\n  .jv-tools .b { font-size: 22px; color: #d2d7e0; background: #3a3f49; border-radius: 6px; padding: 4px 12px; }\n  .jv-tools .f { font-size: 22px; color: #9aa3b2; margin-left: 6px; }\n  .jv-body { padding: 14px 20px 16px; font-size: 26px; display: flex; gap: 18px; }\n  .jv-body .k { color: #4a8cff; }\n  .jv-body .v { color: #e066c4; }\n  section[data-label=\"What we build\"] .rrow { padding-top: 12px; padding-bottom: 12px; }\n  section[data-label=\"What we build\"] .routes { margin-top: 22px; }\n\n  /* roadmap grid */\n  .roadmap { display: grid; grid-template-columns: repeat(4,1fr); gap: 22px; margin-top: 44px; }\n  .rmcard { background: var(--paper); border: 1px solid var(--line); border-radius: 16px; padding: 26px 26px; box-shadow: 0 8px 26px -16px rgba(40,28,90,.3); }\n  .rmcard.accent { background: linear-gradient(160deg,#efeaff,#fbfaff); border-color: #d9d0ff; }\n  .rmcard .rmn { font-family: var(--mono); font-size: 24px; font-weight: 700; color: var(--violet); margin-bottom: 12px; }\n  .rmcard h3 { margin: 0; font-size: 26px; font-weight: 700; letter-spacing: -.01em; line-height: 1.2; }\n  .rmcard p { margin: 8px 0 0; font-size: 24px; color: var(--muted); line-height: 1.32; }\n\n  /* animation */\n  .rise { transform: none; }\n  @media (prefers-reduced-motion: no-preference) {\n    section[data-deck-active] .rise { animation: rise .55s cubic-bezier(.2,.7,.2,1) both; }\n    section[data-deck-active] .rise.d1 { animation-delay: .07s; }\n    section[data-deck-active] .rise.d2 { animation-delay: .14s; }\n    section[data-deck-active] .rise.d3 { animation-delay: .21s; }\n  }\n  @keyframes rise { from { transform: translateY(22px); } to { transform: none; } }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<deck-stage width=\"1920\" height=\"1080\">\n\n  <!-- 1 · Title -->\n  <section class=\"s dark\" data-label=\"Title\">\n    <div class=\"hero\">\n      <div class=\"eyebrow rise\">A TUTORIEL<\u002Fdiv>\n      <h1 class=\"htitle rise d1\" style=\"font-size:80px\">De zéro à votre première<br>application web avec <span class=\"accent\">AdonisJS<\u002Fspan><\u002Fh1>\n      <div class=\"author rise d3\">\n        <div class=\"author-name\">Jaime Arias<\u002Fdiv>\n        <div class=\"author-aff\">CNRS, Laboratoire d'Informatique de Paris Nord (LIPN)<\u002Fdiv>\n        <div class=\"author-date\">23 juin 2026<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"title-venue rise d3\">Journées nationales du DEVeloppement logiciel (JDEV 2026)<\u002Fdiv>\n    <div class=\"title-qr rise d3\">\n      <div class=\"qrbox\"><div class=\"qrcode\" data-qr=\"https://github.com/himito/tutorial-adonisjs\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"title-qr-text\">\n        <div class=\"title-qr-cap\">Code source du tutoriel<\u002Fdiv>\n        <div class=\"title-qr-url\">github.com/himito/tutorial-adonisjs<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 1b · Speaker -->\n  <section class=\"s\" data-label=\"Speaker\">\n    <div class=\"kicker rise\"><span class=\"ix\">0.1<\u002Fspan> Who I am<\u002Fdiv>\n    <div class=\"row center\" style=\"margin-top:18px;gap:80px\">\n      <div class=\"col rise d1\" style=\"flex:0 0 auto;padding:0 30px\">\n        <div class=\"speaker-photo\">\n          <img src=\"514b3ecc-b46f-4ed9-b356-83aadf2c79a5\" alt=\"Jaime Arias\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"col rise d2\" style=\"display:flex;flex-direction:column;gap:24px\">\n        <div>\n          <h1 class=\"title\" style=\"font-size:64px\">Jaime Arias<\u002Fh1>\n          <p class=\"lead\" style=\"font-size:29px;color:var(--violet-deep);margin-top:8px;max-width:none\">CNRS Research Engineer · LIPN<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"speaker-list\">\n          <div>Leads the <b>dev<\u002Fb> team at LIPN<\u002Fdiv>\n          <div>Chargé de Mission at INS2I « Software »<\u002Fdiv>\n          <div>Member · Collège Codes Sources et Logiciels<\u002Fdiv>\n          <div>Ambassador · Software Heritage<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"speaker-pills\">\n          <span class=\"spill\">arias@lipn.univ-paris13.fr<\u002Fspan>\n          <span class=\"spill\">www.jaime-arias.fr<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 2 · What we'll build -->\n  <section class=\"s\" data-label=\"What we build\">\n    <div class=\"kicker rise\"><span class=\"ix\">0.2<\u002Fspan> Orientation<\u002Fdiv>\n    <h2 class=\"title rise\">What we'll build<\u002Fh2>\n    <div class=\"row center\" style=\"margin-top:24px\">\n      <div class=\"col rise d1\">\n        <p class=\"ptext\" style=\"max-width:none;white-space:nowrap\">Backend only — a REST API, built test-first.<\u002Fp>\n        <div class=\"routes\" style=\"margin-top:34px\">\n          <div class=\"rrow\"><span class=\"meth m-POST\">POST<\u002Fspan><span class=\"rpath\">/register<\u002Fspan><\u002Fdiv>\n          <div class=\"rrow\"><span class=\"meth m-POST\">POST<\u002Fspan><span class=\"rpath\">/login<\u002Fspan><\u002Fdiv>\n          <div class=\"rrow\"><span class=\"meth m-GET\">GET<\u002Fspan><span class=\"rpath\">/todos<\u002Fspan><\u002Fdiv>\n          <div class=\"rrow\"><span class=\"meth m-POST\">POST<\u002Fspan><span class=\"rpath\">/todos<\u002Fspan><\u002Fdiv>\n          <div class=\"rrow\"><span class=\"meth m-PUT\">PUT<\u002Fspan><span class=\"rpath\">/todos/:id<\u002Fspan><\u002Fdiv>\n          <div class=\"rrow\"><span class=\"meth m-DELETE\">DELETE<\u002Fspan><span class=\"rpath\">/todos/:id<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"col rise d2\">\n        <div class=\"shotwrap\" style=\"max-width:600px;margin:0 auto\"><img src=\"a1e53900-075b-420e-a539-67b2e4eb04ba\" alt=\"Task manager UI\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"annonce rise d3\" style=\"margin-top:24px;margin-bottom:48px\">\n      <span class=\"annonce-tag\">Demain<\u002Fspan>\n      <span class=\"annonce-text\">Le front-end sera construit dans le tutoriel <b>« Vue.js : Développer des interfaces utilisateur réactives et modulaires »<\u002Fb><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 3 · Roadmap -->\n  <section class=\"s\" data-label=\"Roadmap\">\n    <div class=\"kicker rise\"><span class=\"ix\">0.3<\u002Fspan> Orientation<\u002Fdiv>\n    <h2 class=\"title rise\">The roadmap<\u002Fh2>\n    <div class=\"roadmap\">\n      <div class=\"rmcard rise\"><div class=\"rmn\">01<\u002Fdiv><h3>Project setup<\u002Fh3><p>Scaffold &amp; structure<\u002Fp><\u002Fdiv>\n      <div class=\"rmcard accent rise\"><div class=\"rmn\">02<\u002Fdiv><h3>Working test-first<\u002Fh3><p>The TDD rhythm &amp; Japa<\u002Fp><\u002Fdiv>\n      <div class=\"rmcard rise d1\"><div class=\"rmn\">03<\u002Fdiv><h3>Database groundwork<\u002Fh3><p>Lucid, migrations, models<\u002Fp><\u002Fdiv>\n      <div class=\"rmcard rise d1\"><div class=\"rmn\">04<\u002Fdiv><h3>Endpoints<\u002Fh3><p>Routes &amp; controllers<\u002Fp><\u002Fdiv>\n      <div class=\"rmcard rise d2\"><div class=\"rmn\">05<\u002Fdiv><h3>Validation<\u002Fh3><p>VineJS rules<\u002Fp><\u002Fdiv>\n      <div class=\"rmcard rise d2\"><div class=\"rmn\">06<\u002Fdiv><h3>Auth &amp; authorization<\u002Fh3><p>Tokens &amp; policies<\u002Fp><\u002Fdiv>\n      <div class=\"rmcard rise d3\"><div class=\"rmn\">07<\u002Fdiv><h3>Wrap-up<\u002Fh3><p>The finished, green API<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"ptext rise d3\" style=\"max-width:60ch\">After setup we learn the <b>test-first rhythm<\u002Fb>, lay the database groundwork, then build every endpoint by leading with a test.<\u002Fp>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 4 · What is AdonisJS -->\n  <section class=\"s\" data-label=\"What is AdonisJS\">\n    <div class=\"kicker rise\"><span class=\"ix\">0.4<\u002Fspan> Orientation<\u002Fdiv>\n    <h2 class=\"title rise\">What is AdonisJS?<\u002Fh2>\n    <p class=\"lead wide rise d1\" style=\"max-width:none\">A <b style=\"color:var(--ink)\">batteries-included, TypeScript-first<\u002Fb> backend framework — the \"Laravel of Node\". The pieces are built by one team to fit together.<\u002Fp>\n    <div class=\"cards c2 rise d2\">\n      <div class=\"card\"><div class=\"cic\">★<\u002Fdiv><h3>TypeScript-first<\u002Fh3><p>The framework, its config and your models are fully typed end-to-end.<\u002Fp><\u002Fdiv>\n      <div class=\"card\"><div class=\"cic\">⚡<\u002Fdiv><h3>Batteries included<\u002Fh3><p>ORM, auth, validation, mailer, queues and tests — all first-party.<\u002Fp><\u002Fdiv>\n      <div class=\"card\"><div class=\"cic\">⌘<\u002Fdiv><h3>Convention over config<\u002Fh3><p>Sensible defaults and a predictable layout. Less wiring, more building.<\u002Fp><\u002Fdiv>\n      <div class=\"card\"><div class=\"cic\">⛨<\u002Fdiv><h3>Built for real apps<\u002Fh3><p>Security, sessions, rate-limiting and testing are first-class.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 5 · History & v7 -->\n  <section class=\"s\" data-label=\"History\">\n    <div class=\"kicker rise\"><span class=\"ix\">0.5<\u002Fspan> Orientation<\u002Fdiv>\n    <h2 class=\"title rise\">History &amp; version 7<\u002Fh2>\n    <p class=\"lead wide rise d1\" style=\"max-width:none\">Created by <b style=\"color:var(--ink)\">Harminder Virk<\u002Fb> around 2016 to end the \"assemble your stack from scratch\" era in Node. Inspired by Laravel and Rails.<\u002Fp>\n    <div class=\"stats rise d2\">\n      <div class=\"stat\"><div class=\"n\">~2016<\u002Fdiv><div class=\"l\">First release<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat\"><div class=\"n\">v6<\u002Fdiv><div class=\"l\">Native ESM + TypeScript rewrite<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat\"><div class=\"n\">v7<\u002Fdiv><div class=\"l\">End-to-end type safety (2026)<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat\"><div class=\"n\">24<\u002Fdiv><div class=\"l\">Minimum Node.js version<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"ptext rise d3\" style=\"max-width:none\">v7 highlights: end-to-end type safety, a <b>new migrations-first Lucid<\u002Fb> that generates your model schema, zero-config OpenTelemetry, and a reworked auth starter kit.<\u002Fp>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 6 · State of JS 2025 ecosystem -->\n  <section class=\"s\" data-label=\"Ecosystem\">\n    <div class=\"kicker rise\"><span class=\"ix\">0.6<\u002Fspan> Orientation<\u002Fdiv>\n    <h2 class=\"title rise\">AdonisJS in the ecosystem<\u002Fh2>\n    <p class=\"ptext rise d1\" style=\"max-width:none;margin-top:8px\">Back-end frameworks by <b>usage<\u002Fb> — Express still dominates, while AdonisJS is a smaller, dedicated player.<\u002Fp>\n    <div class=\"barchart rise d2\">\n      <div class=\"bcrow\"><span class=\"bclabel\">Express<\u002Fspan><span class=\"bctrack\"><span class=\"bcfill\" style=\"width:80%\"><\u002Fspan><\u002Fspan><span class=\"bcval\">80%<\u002Fspan><\u002Fdiv>\n      <div class=\"bcrow\"><span class=\"bclabel\">NestJS<\u002Fspan><span class=\"bctrack\"><span class=\"bcfill\" style=\"width:32%\"><\u002Fspan><\u002Fspan><span class=\"bcval\">32%<\u002Fspan><\u002Fdiv>\n      <div class=\"bcrow\"><span class=\"bclabel\">Fastify<\u002Fspan><span class=\"bctrack\"><span class=\"bcfill\" style=\"width:20%\"><\u002Fspan><\u002Fspan><span class=\"bcval\">20%<\u002Fspan><\u002Fdiv>\n      <div class=\"bcrow\"><span class=\"bclabel\">Strapi<\u002Fspan><span class=\"bctrack\"><span class=\"bcfill\" style=\"width:15%\"><\u002Fspan><\u002Fspan><span class=\"bcval\">15%<\u002Fspan><\u002Fdiv>\n      <div class=\"bcrow\"><span class=\"bclabel\">Hono<\u002Fspan><span class=\"bctrack\"><span class=\"bcfill\" style=\"width:15%\"><\u002Fspan><\u002Fspan><span class=\"bcval\">15%<\u002Fspan><\u002Fdiv>\n      <div class=\"bcrow\"><span class=\"bclabel\">tRPC<\u002Fspan><span class=\"bctrack\"><span class=\"bcfill\" style=\"width:12%\"><\u002Fspan><\u002Fspan><span class=\"bcval\">12%<\u002Fspan><\u002Fdiv>\n      <div class=\"bcrow\"><span class=\"bclabel\">Koa<\u002Fspan><span class=\"bctrack\"><span class=\"bcfill\" style=\"width:11%\"><\u002Fspan><\u002Fspan><span class=\"bcval\">11%<\u002Fspan><\u002Fdiv>\n      <div class=\"bcrow\"><span class=\"bclabel\">Nitro<\u002Fspan><span class=\"bctrack\"><span class=\"bcfill\" style=\"width:9%\"><\u002Fspan><\u002Fspan><span class=\"bcval\">9%<\u002Fspan><\u002Fdiv>\n      <div class=\"bcrow\"><span class=\"bclabel\">ElysiaJS<\u002Fspan><span class=\"bctrack\"><span class=\"bcfill\" style=\"width:5%\"><\u002Fspan><\u002Fspan><span class=\"bcval\">5%<\u002Fspan><\u002Fdiv>\n      <div class=\"bcrow\"><span class=\"bclabel\">Hapi<\u002Fspan><span class=\"bctrack\"><span class=\"bcfill\" style=\"width:4%\"><\u002Fspan><\u002Fspan><span class=\"bcval\">4%<\u002Fspan><\u002Fdiv>\n      <div class=\"bcrow hl\"><span class=\"bclabel\">AdonisJS<\u002Fspan><span class=\"bctrack\"><span class=\"bcfill\" style=\"width:3%\"><\u002Fspan><\u002Fspan><span class=\"bcval\">3%<\u002Fspan><\u002Fdiv>\n      <div class=\"bcrow\"><span class=\"bclabel\">Directus<\u002Fspan><span class=\"bctrack\"><span class=\"bcfill\" style=\"width:3%\"><\u002Fspan><\u002Fspan><span class=\"bcval\">3%<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"bcsource rise d3\">Source : State of JS 2025 — Back-end Frameworks · usage (% des répondants ayant déjà utilisé)<\u002Fp>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 6 · Strengths & trade-offs -->\n  <section class=\"s\" data-label=\"Trade-offs\">\n    <div class=\"kicker rise\"><span class=\"ix\">0.7<\u002Fspan> Orientation<\u002Fdiv>\n    <h2 class=\"title rise\">Strengths &amp; trade-offs<\u002Fh2>\n    <div class=\"row\" style=\"margin-top:34px\">\n      <div class=\"col rise d1\">\n        <div class=\"cards c2\" style=\"margin-top:0\">\n          <div class=\"card good\"><div class=\"cic\">✓<\u002Fdiv><h3>Productive day one<\u002Fh3><p>Auth, ORM, validation, tests pre-integrated.<\u002Fp><\u002Fdiv>\n          <div class=\"card good\"><div class=\"cic\">✓<\u002Fdiv><h3>Cohesive &amp; typed<\u002Fh3><p>One team, one stack, excellent TS support.<\u002Fp><\u002Fdiv>\n          <div class=\"card good\"><div class=\"cic\">✓<\u002Fdiv><h3>Structured<\u002Fh3><p>Clear MVC keeps big codebases consistent.<\u002Fp><\u002Fdiv>\n          <div class=\"card good\"><div class=\"cic\">✓<\u002Fdiv><h3>Great docs &amp; CLI<\u002Fh3><p>Thorough docs; Ace scaffolds everything.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"col rise d2\">\n        <div class=\"cards c2\" style=\"margin-top:0\">\n          <div class=\"card bad\"><div class=\"cic\">!<\u002Fdiv><h3>Smaller ecosystem<\u002Fh3><p>Fewer third-party guides than Express/Nest.<\u002Fp><\u002Fdiv>\n          <div class=\"card bad\"><div class=\"cic\">!<\u002Fdiv><h3>Opinionated<\u002Fh3><p>Conventions can chafe off the beaten path.<\u002Fp><\u002Fdiv>\n          <div class=\"card bad\"><div class=\"cic\">!<\u002Fdiv><h3>Learning curve<\u002Fh3><p>IoC, decorators and providers take time.<\u002Fp><\u002Fdiv>\n          <div class=\"card bad\"><div class=\"cic\">!<\u002Fdiv><h3>Smaller hiring pool<\u002Fh3><p>Fewer developers know it than Express.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- DIVIDER 00 · Tooling -->\n  <section class=\"s dark\" data-label=\"00 Tooling\">\n    <div class=\"divider\">\n      <div class=\"divtag rise\">Module 00<\u002Fdiv>\n      <div class=\"divnum rise\">00<\u002Fdiv>\n      <h2 class=\"divlabel rise d1\">Tooling<\u002Fh2>\n      <p class=\"divsub rise d2\">Set up your editor first — so AdonisJS, types and lint errors guide you the moment you start typing.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- VSCode extensions -->\n  <section class=\"s\" data-label=\"Editor setup\">\n    <div class=\"kicker rise\"><span class=\"ix\">0.8<\u002Fspan> Tooling<\u002Fdiv>\n    <h2 class=\"title rise\">Set up VS Code<\u002Fh2>\n    <p class=\"ptext rise d1\" style=\"max-width:none;margin-top:8px\">A handful of extensions turn the editor into a guide — autocomplete for AdonisJS, plus the lint/format/error trio every Node.js project wants.<\u002Fp>\n    <div class=\"row rise d2\" style=\"margin-top:26px;gap:48px;align-items:flex-start;flex:0 0 auto\">\n      <div class=\"extcol\">\n        <p class=\"extcol-h\"><span class=\"dot\" style=\"background:var(--violet)\"><\u002Fspan>AdonisJS<\u002Fp>\n        <div class=\"extcard\">\n          <div class=\"extlogo\" style=\"background:linear-gradient(135deg,var(--violet),var(--violet-2))\">A<\u002Fdiv>\n          <div class=\"extbody\">\n            <div class=\"extname\">AdonisJS Extension<\u002Fdiv>\n            <div class=\"extid\">jripouteau.adonis-vscode-extension<\u002Fdiv>\n            <div class=\"extdesc\">Autocomplete, go-to-route, and run <code>ace<\u002Fcode> commands from the editor.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"extcard\">\n          <div class=\"extlogo\" style=\"background:linear-gradient(135deg,#2c9a5d,#1f8a52)\">J<\u002Fdiv>\n          <div class=\"extbody\">\n            <div class=\"extname\">Japa Extension<\u002Fdiv>\n            <div class=\"extid\">jripouteau.japa-vscode<\u002Fdiv>\n            <div class=\"extdesc\">Run &amp; debug a single test straight from the gutter.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"extcol\">\n        <p class=\"extcol-h\"><span class=\"dot\" style=\"background:#2c9a5d\"><\u002Fspan>Node.js essentials<\u002Fp>\n        <div class=\"extcard\">\n          <div class=\"extlogo\" style=\"background:linear-gradient(135deg,#5b48d6,#4b3fa8)\">E<\u002Fdiv>\n          <div class=\"extbody\">\n            <div class=\"extname\">ESLint<\u002Fdiv>\n            <div class=\"extid\">dbaeumer.vscode-eslint<\u002Fdiv>\n            <div class=\"extdesc\">Catches bugs and enforces code rules as you type.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"extcard\">\n          <div class=\"extlogo\" style=\"background:linear-gradient(135deg,#d96c2c,#c0561f)\">P<\u002Fdiv>\n          <div class=\"extbody\">\n            <div class=\"extname\">Prettier - Code formatter<\u002Fdiv>\n            <div class=\"extid\">esbenp.prettier-vscode<\u002Fdiv>\n            <div class=\"extdesc\">Formats on save — one consistent style, zero debates.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"extcard\">\n          <div class=\"extlogo\" style=\"background:linear-gradient(135deg,#c0392b,#962d22)\">!<\u002Fdiv>\n          <div class=\"extbody\">\n            <div class=\"extname\">Error Lens<\u002Fdiv>\n            <div class=\"extid\">usernamehw.errorlens<\u002Fdiv>\n            <div class=\"extdesc\">Inlines errors &amp; warnings right on the offending line.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 7 · DIVIDER 01 -->\n  <section class=\"s dark\" data-label=\"01 Setup\">\n    <div class=\"divider\">\n      <div class=\"divtag rise\">Module 01<\u002Fdiv>\n      <div class=\"divnum rise\">01<\u002Fdiv>\n      <h2 class=\"divlabel rise d1\">Project setup<\u002Fh2>\n      <p class=\"divsub rise d2\">Scaffold the API with a starter kit and learn how a request flows through the app.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 8 · Create the project -->\n  <section class=\"s\" data-label=\"Create project\">\n    <div class=\"kicker rise\"><span class=\"ix\">1.1<\u002Fspan> Creating the project<\u002Fdiv>\n    <h2 class=\"title rise\">Scaffold from a starter kit<\u002Fh2>\n    <p class=\"ptext rise d1\" style=\"max-width:none;margin-top:8px\">Starter kits are pre-configured templates. We pick <code>--kit=api<\u002Fcode> — a headless JSON backend with the database and token auth already wired up.<\u002Fp>\n    <div class=\"row rise d2\" style=\"margin-top:22px;gap:46px\">\n      <div class=\"col\" style=\"flex:1.05\">\n        <div class=\"term\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\">bash<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"bash\"># scaffold\nnpm create adonisjs@latest todo-api -- --kit=api\n# run backend + frontend\ncd todo-api\nnpm run dev<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n        <p class=\"ptext\" style=\"margin:14px 0 8px;font-size:26px;max-width:none\">Open <code style=\"font-size:25px\">http://localhost:3333<\u002Fcode> — the backend returns:<\u002Fp>\n        <div class=\"jsonview\">\n          <div class=\"jv-tabs\"><span class=\"on\">JSON<\u002Fspan><span>Raw Data<\u002Fspan><span>Headers<\u002Fspan><\u002Fdiv>\n          <div class=\"jv-tools\"><span class=\"b\">Save<\u002Fspan><span class=\"b\">Copy<\u002Fspan><span class=\"b\">Collapse All<\u002Fspan><span class=\"b\">Expand All<\u002Fspan><span class=\"f\">▽ Filter JSON<\u002Fspan><\u002Fdiv>\n          <div class=\"jv-body\"><span class=\"k\">hello:<\u002Fspan><span class=\"v\">\"world\"<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"col\" style=\"flex:1\">\n        <p style=\"font-size:25px;font-weight:700;margin:2px 0 14px;color:var(--ink)\">Official starter kits<\u002Fp>\n        <div style=\"display:flex;align-items:baseline;gap:12px;margin:0 0 3px\">\n          <span style=\"font-family:var(--mono);font-size:26px;font-weight:700;color:var(--violet-deep)\">api<\u002Fspan>\n          <span style=\"font-size:19px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#fff;background:var(--violet);border-radius:7px;padding:3px 10px\">notre choix<\u002Fspan>\n        <\u002Fdiv>\n        <p class=\"ptext\" style=\"margin:0 0 16px;font-size:25px;max-width:none\">Backend + empty frontend monorepo, end-to-end type-safe.<\u002Fp>\n        <p style=\"font-family:var(--mono);font-size:26px;font-weight:700;color:var(--ink-2);margin:0 0 3px\">hypermedia<\u002Fp>\n        <p class=\"ptext\" style=\"margin:0 0 16px;font-size:25px;max-width:none\">Server-rendered HTML with Edge templates &amp; Alpine.js.<\u002Fp>\n        <p style=\"font-family:var(--mono);font-size:26px;font-weight:700;color:var(--ink-2);margin:0 0 3px\">react · vue<\u002Fp>\n        <p class=\"ptext\" style=\"margin:0 0 16px;font-size:25px;max-width:none\">Fullstack via Inertia.js — server-rendered or SPA.<\u002Fp>\n        <p class=\"ptext\" style=\"margin:0;font-size:24px;max-width:none;color:var(--muted)\"><b style=\"color:var(--ink-2)\">Community:<\u002Fb> <code style=\"font-size:24px\">slim<\u002Fcode> (minimal) · <code style=\"font-size:24px\">mcp<\u002Fcode> (MCP server).<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 9 · Project structure -->\n  <section class=\"s\" data-label=\"Structure\">\n    <div class=\"kicker rise\"><span class=\"ix\">1.2<\u002Fspan> Project structure<\u002Fdiv>\n    <h2 class=\"title rise\">Where things live<\u002Fh2>\n    <div class=\"row center\">\n      <div class=\"col rise d1\">\n        <div class=\"tree\" style=\"line-height:1.5;margin-top:24px\">todo-api/\n├── <b>app/<\u002Fb>\n│   ├── controllers/   <span class=\"c\"># request handlers<\u002Fspan>\n│   ├── models/        <span class=\"c\"># one per table<\u002Fspan>\n│   ├── middleware/    <span class=\"c\"># HTTP middleware<\u002Fspan>\n│   └── validators/    <span class=\"c\"># VineJS schemas<\u002Fspan>\n├── <b>bin/<\u002Fb>          <span class=\"c\"># boot entry points<\u002Fspan>\n├── <b>config/<\u002Fb>       <span class=\"c\"># database, auth, hash…<\u002Fspan>\n├── <b>database/<\u002Fb>\n│   ├── migrations/    <span class=\"c\"># schema changes<\u002Fspan>\n│   └── schema.ts      <span class=\"c\"># generated models<\u002Fspan>\n├── <b>providers/<\u002Fb>    <span class=\"c\"># service providers<\u002Fspan>\n├── <b>start/<\u002Fb>        <span class=\"c\"># routes.ts, kernel.ts<\u002Fspan>\n├── <b>tests/<\u002Fb>        <span class=\"c\"># unit, functional (Japa)<\u002Fspan>\n└── <b>tmp/<\u002Fb>          <span class=\"c\"># logs, uploads (git-ignored)<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"col rise d2\">\n        <p class=\"ptext\" style=\"margin-top:0;max-width:none;white-space:nowrap\"><b>Subpath aliases<\u002Fb> replace fragile relative paths.<\u002Fp>\n        <div class=\"codecard sm\" style=\"margin-top:24px\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\">any file<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"ts\">import Todo from '#models/todo'\n// always → app/models/todo.ts\n// no more ../../../models/todo<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n        <p class=\"ptext\" style=\"margin-top:20px;max-width:none;font-size:26px\">Configured under the <code style=\"font-size:25px\">\"imports\"<\u002Fcode> field in <code style=\"font-size:25px\">package.json<\u002Fcode>.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 10 · Request lifecycle -->\n  <section class=\"s\" data-label=\"Lifecycle\">\n    <div class=\"kicker rise\"><span class=\"ix\">1.3<\u002Fspan> Request lifecycle<\u002Fdiv>\n    <h2 class=\"title rise\">How a request flows<\u002Fh2>\n    <div class=\"flowwrap rise d1\">\n      <div class=\"fnode\">\n        <div class=\"fic\"><svg viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"2\" y=\"3\" width=\"16\" height=\"11\" rx=\"1.6\"><\u002Frect><path d=\"M7 17h6M10 14v3\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div class=\"fname\">Client<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"flanes rise d2\">\n        <div class=\"flane req\">\n          <span class=\"fll\">Request<\u002Fspan>\n          <div class=\"farrow req\"><span class=\"line\"><\u002Fspan><span class=\"head\"><\u002Fspan><\u002Fdiv>\n          <span class=\"flsub\">POST /todos + token<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"flane res\">\n          <span class=\"fll\">Response<\u002Fspan>\n          <div class=\"farrow res\"><span class=\"line\"><\u002Fspan><span class=\"head\"><\u002Fspan><\u002Fdiv>\n          <span class=\"flsub\">200 · JSON<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"fbox rise d2\">\n        <div class=\"fboxtitle\">AdonisJS application<\u002Fdiv>\n        <div class=\"fbstages\">\n          <div class=\"fbstage\"><div class=\"si\"><svg viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"5\" cy=\"14\" r=\"2.2\"><\u002Fcircle><circle cx=\"15\" cy=\"6\" r=\"2.2\"><\u002Fcircle><path d=\"M15 8.2v3a3 3 0 0 1-3 3H7.2\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div class=\"sn\">Router<\u002Fdiv><\u002Fdiv>\n          <div class=\"fbconn\"><svg viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 10h12M11 5l5 5-5 5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div class=\"fbstage\"><div class=\"si\"><svg viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M10 2.5l6 2.4v4.4c0 3.5-2.5 6.2-6 7.3-3.5-1.1-6-3.8-6-7.3V4.9l6-2.4Z\"><\u002Fpath><path d=\"M7.6 10l1.7 1.7L13 8\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div class=\"sn\">Middleware<\u002Fdiv><\u002Fdiv>\n          <div class=\"fbconn\"><svg viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 10h12M11 5l5 5-5 5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div class=\"fbstage\"><div class=\"si\"><svg viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M8 3.5c-2 0-2 2-2 3.2S6 9 4.5 9c1.5 0 1.5 1.3 1.5 2.3S6 16.5 8 16.5M12 3.5c2 0 2 2 2 3.2S14 9 15.5 9C14 9 14 10.3 14 11.3s0 5.2-2 5.2\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div class=\"sn\">Controller<\u002Fdiv><\u002Fdiv>\n          <div class=\"fbconn\"><svg viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 10h12M11 5l5 5-5 5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div class=\"fbstage\"><div class=\"si\"><svg viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3.5 6.5h13M3.5 6.5v7M16.5 6.5v7M3.5 13.5h13M6.5 6.5v7M13.5 6.5v7\"><\u002Fpath><\u002Fsvg><\u002Fdiv><div class=\"sn\">Model<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"farrow2 rise d3\">\n        <svg viewBox=\"0 0 48 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"width:84px;height:32px\"><path d=\"M5 10h38M5 10l5-4M5 10l5 4M43 10l-5-4M43 10l-5 4\"><\u002Fpath><\u002Fsvg>\n        <span class=\"a2lbl\">SQL<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"fnode db\">\n        <div class=\"fic\"><svg viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><ellipse cx=\"10\" cy=\"5\" rx=\"6.5\" ry=\"2.5\"><\u002Fellipse><path d=\"M3.5 5v10c0 1.4 2.9 2.5 6.5 2.5s6.5-1.1 6.5-2.5V5M3.5 10c0 1.4 2.9 2.5 6.5 2.5s6.5-1.1 6.5-2.5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div class=\"fname\">PostgreSQL<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"flowcap rise d3\">The request enters the app, flows through the pipeline to the database, and the controller's return value flows back out as the JSON <b>response<\u002Fb>.<\u002Fp>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 11 · DIVIDER 02 Working test-first -->\n  <section class=\"s dark\" data-label=\"02 Test-first\">\n    <div class=\"divider\">\n      <div class=\"divtag rise\">Module 02<\u002Fdiv>\n      <div class=\"divnum rise\">02<\u002Fdiv>\n      <h2 class=\"divlabel rise d1\">Working test-first<\u002Fh2>\n      <p class=\"divsub rise d2\">Before building any feature, we agree on the rhythm: describe behaviour as a test, then build to green.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 12 · The TDD rhythm -->\n  <section class=\"s\" data-label=\"TDD rhythm\">\n    <div class=\"kicker rise\"><span class=\"ix\">2.1<\u002Fspan> The TDD rhythm<\u002Fdiv>\n    <h2 class=\"title rise\">Describe → make it pass → tidy<\u002Fh2>\n    <p class=\"ptext rise d1\" style=\"max-width:none\">Instead of testing afterwards, we lead with a test that states what an endpoint should do — then write just enough code to satisfy it.<\u002Fp>\n    <div class=\"flow rise d2\">\n      <div class=\"fstep red\"><div class=\"num\">1<\u002Fdiv><h3>Describe (red)<\u002Fh3><p>Write a test for the behaviour. It fails — the feature doesn't exist yet.<\u002Fp><\u002Fdiv>\n      <div class=\"fstep green\"><div class=\"num\">2<\u002Fdiv><h3>Make it pass (green)<\u002Fh3><p>Write the route, controller or model that satisfies the test.<\u002Fp><\u002Fdiv>\n      <div class=\"fstep\"><div class=\"num\">3<\u002Fdiv><h3>Tidy up<\u002Fh3><p>Refactor with confidence — a green test proves nothing broke.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"ptext rise d3\" style=\"max-width:none\">We keep it <b>lighter than dogmatic TDD<\u002Fb> — not a failing test for every line, but each real feature leads with a test that states the goal.<\u002Fp>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Meet Japa -->\n  <section class=\"s\" data-label=\"Meet Japa\">\n    <div class=\"kicker rise\"><span class=\"ix\">2.2<\u002Fspan> The test runner<\u002Fdiv>\n    <h2 class=\"title rise\">Meet Japa<\u002Fh2>\n    <p class=\"lead wide rise d1\" style=\"margin-top:16px;max-width:1470px\">The <b style=\"color:var(--ink)\">official AdonisJS testing framework<\u002Fb> — a fast, TypeScript-native runner that's already wired into the API kit. No Jest, no setup.<\u002Fp>\n    <div class=\"cards c2 rise d2\">\n      <div class=\"card\"><div class=\"cic\">⌘<\u002Fdiv><h3>Configured out of the box<\u002Fh3><p>The API kit pre-wires Japa and a test client that already knows your app. Just write tests.<\u002Fp><\u002Fdiv>\n      <div class=\"card\"><div class=\"cic\">⇄<\u002Fdiv><h3>Real HTTP requests<\u002Fh3><p>The client hits your actual routes, middleware and controllers end-to-end — not mocks.<\u002Fp><\u002Fdiv>\n      <div class=\"card\"><div class=\"cic\">⚡<\u002Fdiv><h3>Fast &amp; TypeScript-native<\u002Fh3><p>A small, modern API with a quick runner — the whole suite runs in milliseconds.<\u002Fp><\u002Fdiv>\n      <div class=\"card\"><div class=\"cic\">⛁<\u002Fdiv><h3>Batteries included<\u002Fh3><p>Assertions, suites, lifecycle hooks, and DB transactions that keep tests isolated.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"qrpanel rise d3\">\n      <div class=\"qrbox\"><div class=\"qrcode\" data-qr=\"https://japa.dev\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"qrurl\">japa.dev<\u002Fdiv>\n      <div class=\"qrcap\">Scan for docs<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 13 · Your first test -->\n  <section class=\"s\" data-label=\"First test\">\n    <div class=\"kicker rise\"><span class=\"ix\">2.3<\u002Fspan> Your first test<\u002Fdiv>\n    <h2 class=\"title rise\">Prove the harness works<\u002Fh2>\n    <p class=\"ptext rise d1\" style=\"max-width:none\">Before any feature, confirm the harness runs: generate a test with <b>ace<\u002Fb>, then send a <i>real<\u002Fi> HTTP request to the health route at <code>/<\u002Fcode> — no database needed.<\u002Fp>\n    <div class=\"row rise d2\" style=\"margin-top:20px\">\n      <div class=\"col\">\n        <div class=\"term\" style=\"margin-bottom:12px\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\">bash<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"bash\">node ace make:test health --suite=functional<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n        <div class=\"codecard sm\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\"><span class=\"path\">tests/functional/<\u002Fspan>health.spec.ts<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"ts\">import { test } from '@japa/runner'\n\ntest.group('Health', () =&gt; {\n  test('server is alive', async ({ client }) =&gt; {\n    const res = await client.get('/')\n    res.assertOk()\n  })\n})<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"col\">\n        <div class=\"term\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\">bash<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"bash\">npm run test\n<span class=\"ok\">  ✔ the server is alive (14ms)<\u002Fspan>\n<span class=\"ok\">PASSED · 1 passed (1)<\u002Fspan><\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n        <p class=\"ptext\" style=\"margin-top:24px;max-width:none\">That green line is the rhythm we repeat for every feature.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 14 · DIVIDER 03 Database groundwork -->\n  <section class=\"s dark\" data-label=\"03 Database\">\n    <div class=\"divider\">\n      <div class=\"divtag rise\">Module 03<\u002Fdiv>\n      <div class=\"divnum rise\">03<\u002Fdiv>\n      <h2 class=\"divlabel rise d1\">Database groundwork<\u002Fh2>\n      <p class=\"divsub rise d2\">The plumbing endpoints need: a connection, a table and a model. Once it's here, every endpoint starts with a test.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Meet Lucid ORM -->\n  <section class=\"s\" data-label=\"Meet Lucid\">\n    <div class=\"kicker rise\"><span class=\"ix\">3.1<\u002Fspan> The ORM<\u002Fdiv>\n    <h2 class=\"title rise\">Meet Lucid<\u002Fh2>\n    <p class=\"lead wide rise d1\" style=\"margin-top:16px;max-width:1370px\">The <b style=\"color:var(--ink)\">official AdonisJS ORM<\u002Fb> — a TypeScript-first Active Record with a migrations-first workflow that generates your model schema for you.<\u002Fp>\n    <div class=\"cards c2 rise d2\">\n      <div class=\"card\"><div class=\"cic\">⛁<\u002Fdiv><h3>Active Record models<\u002Fh3><p>Each model maps to a table — query through the class, and every row is an instance you can save or delete.<\u002Fp><\u002Fdiv>\n      <div class=\"card\"><div class=\"cic\">⌘<\u002Fdiv><h3>Migrations-first schema<\u002Fh3><p>Describe tables in versioned migrations; Lucid scans the database and generates typed columns for you.<\u002Fp><\u002Fdiv>\n      <div class=\"card\"><div class=\"cic\">⚡<\u002Fdiv><h3>Fluent query builder<\u002Fh3><p>Readable, chainable queries for the common cases — and an escape hatch to raw SQL when you need it.<\u002Fp><\u002Fdiv>\n      <div class=\"card\"><div class=\"cic\">⇄<\u002Fdiv><h3>Relationships &amp; more<\u002Fh3><p><code>hasMany<\u002Fcode>, <code>belongsTo<\u002Fcode>, hooks, transactions and pagination all come built in.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"qrpanel rise d3\">\n      <div class=\"qrbox\"><div class=\"qrcode\" data-qr=\"https://lucid.adonisjs.com\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"qrurl\">lucid.adonisjs.com<\u002Fdiv>\n      <div class=\"qrcap\">Scan for docs<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 15 · Connect Postgres -->\n  <section class=\"s\" data-label=\"Connect DB\">\n    <div class=\"kicker rise\"><span class=\"ix\">3.2<\u002Fspan> Connecting to the database<\u002Fdiv>\n    <h2 class=\"title rise\">Point Lucid at a database<\u002Fh2>\n    <div class=\"row\" style=\"margin-top:34px\">\n      <div class=\"col rise d1\">\n        <div class=\"codecard sm\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\">.env<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"env\">DB_CONNECTION=sqlite\n# file lives in the project root\n# nothing else to configure<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"col rise d2\">\n        <div class=\"codecard sm\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\"><span class=\"path\">config/<\u002Fspan>database.ts<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"ts\">sqlite: {\n  client: 'better-sqlite3',\n  connection: {\n    filename: app.tmpPath('db.sqlite3'),\n  },\n  useNullAsDefault: true,\n  migrations: { naturalSort: true },\n}<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"ptext rise d3\" style=\"max-width:none;margin-bottom:56px\">SQLite needs zero setup — just <code style=\"font-size:25px\">npm i better-sqlite3<\u002Fcode>. The whole database is a single file; swap <code style=\"font-size:25px\">DB_CONNECTION<\u002Fcode> later for Postgres in production.<\u002Fp>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- The database schema (ER diagram) -->\n  <section class=\"s\" data-label=\"Schema\">\n    <div class=\"kicker rise\"><span class=\"ix\">3.3<\u002Fspan> The data model<\u002Fdiv>\n    <h2 class=\"title rise\">The database schema<\u002Fh2>\n    <p class=\"ptext rise d1\" style=\"max-width:none;margin-top:8px\">Two tables, one relationship: a <b>user<\u002Fb> has many <b>todos<\u002Fb>, and each todo belongs to a user.<\u002Fp>\n    <div class=\"erwrap rise d2\">\n      <div class=\"ertable\">\n        <div class=\"ert-head\"><svg viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"10\" cy=\"6.5\" r=\"3.2\"><\u002Fcircle><path d=\"M4 16.5c0-3 2.7-4.8 6-4.8s6 1.8 6 4.8\"><\u002Fpath><\u002Fsvg>users<\u002Fdiv>\n        <div class=\"ert-row pk\"><span class=\"ert-name\">id<\u002Fspan><span class=\"ert-type\" style=\"color:var(--violet-deep)\">integer · PK<\u002Fspan><\u002Fdiv>\n        <div class=\"ert-row\"><span class=\"ert-name\">email<\u002Fspan><span class=\"ert-type\">string<\u002Fspan><\u002Fdiv>\n        <div class=\"ert-row\"><span class=\"ert-name\">password<\u002Fspan><span class=\"ert-type\">string<\u002Fspan><\u002Fdiv>\n        <div class=\"ert-row\"><span class=\"ert-name\">created_at<\u002Fspan><span class=\"ert-type\">timestamp<\u002Fspan><\u002Fdiv>\n        <div class=\"ert-row\"><span class=\"ert-name\">updated_at<\u002Fspan><span class=\"ert-type\">timestamp<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"erlink\">\n        <span class=\"erl-rel\">1 ──&lt; ∞<\u002Fspan>\n        <span class=\"erl-sub\">hasMany<br>belongsTo<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"ertable\">\n        <div class=\"ert-head\"><svg viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 3.5h10a1 1 0 0 1 1 1v11a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-11a1 1 0 0 1 1-1Z\"><\u002Fpath><path d=\"M7 7.5l1.4 1.4L11 6.3M7 13h6\"><\u002Fpath><\u002Fsvg>todos<\u002Fdiv>\n        <div class=\"ert-row pk\"><span class=\"ert-name\">id<\u002Fspan><span class=\"ert-type\" style=\"color:var(--violet-deep)\">integer · PK<\u002Fspan><\u002Fdiv>\n        <div class=\"ert-row\"><span class=\"ert-name\">title<\u002Fspan><span class=\"ert-type\">string<\u002Fspan><\u002Fdiv>\n        <div class=\"ert-row\"><span class=\"ert-name\">completed<\u002Fspan><span class=\"ert-type\">boolean<\u002Fspan><\u002Fdiv>\n        <div class=\"ert-row fk\"><span class=\"ert-name\">user_id<\u002Fspan><span class=\"ert-type\" style=\"color:#1f8a52\">integer · FK<\u002Fspan><\u002Fdiv>\n        <div class=\"ert-row\"><span class=\"ert-name\">created_at<\u002Fspan><span class=\"ert-type\">timestamp<\u002Fspan><\u002Fdiv>\n        <div class=\"ert-row\"><span class=\"ert-name\">updated_at<\u002Fspan><span class=\"ert-type\">timestamp<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"flowcap rise d3\" style=\"text-align:center\"><code style=\"font-family:var(--mono);font-size:25px;color:var(--violet-deep)\">todos.user_id<\u002Fcode> references <code style=\"font-family:var(--mono);font-size:25px;color:var(--violet-deep)\">users.id<\u002Fcode> — delete a user and their todos cascade away.<\u002Fp>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 16+17 · Migrations (merged) -->\n  <section class=\"s\" data-label=\"Migrations\">\n    <div class=\"kicker rise\"><span class=\"ix\">3.4<\u002Fspan> Migrations<\u002Fdiv>\n    <h2 class=\"title rise\">Version control for your schema<\u002Fh2>\n    <p class=\"lead wide rise d1\" style=\"max-width:none\">A migration describes a database change in code — an <code>up()<\u002Fcode> to apply it and a <code>down()<\u002Fcode> to undo it. The <code>-m<\u002Fcode> flag scaffolds the model and its migration together.<\u002Fp>\n    <div class=\"row\" style=\"margin-top:24px;gap:46px;align-items:flex-start\">\n      <div class=\"col rise d2\" style=\"flex:0.92\">\n        <div class=\"term\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\">bash<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"bash\"># model + migration in one command\nnode ace make:model Todo -m\n<span class=\"ok\">✔ CREATE app/models/todo.ts<\u002Fspan>\n<span class=\"ok\">✔ CREATE ..._create_todos_table.ts<\u002Fspan>\n\n# apply pending migrations\nnode ace migration:run<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"col rise d3\" style=\"flex:1.08\">\n        <div class=\"codecard sm\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\"><span class=\"path\">database/migrations/<\u002Fspan>..._todos.ts<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"ts\" style=\"line-height:1.4\">async up() {\n  this.schema.createTable(this.tableName, (table) =&gt; {\n    table.increments('id')\n    table.string('title').notNullable()\n    table.boolean('completed').defaultTo(false)\n    table.integer('user_id').unsigned()\n      .references('id').inTable('users')\n      .onDelete('CASCADE')\n    table.timestamp('created_at')\n    table.timestamp('updated_at')\n  })\n}<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 18 · Schema generation -->\n  <section class=\"s\" data-label=\"Schema generation\">\n    <div class=\"kicker rise\"><span class=\"ix\">3.5<\u002Fspan> Schema generation<\u002Fdiv>\n    <h2 class=\"title rise\">What makes Lucid 7 special<\u002Fh2>\n    <p class=\"ptext rise d1\" style=\"max-width:none\">The database is the single source of truth. You never declare columns twice.<\u002Fp>\n    <div class=\"pipe rise d2\">\n      <div class=\"pbox\"><div class=\"pn\">STEP 1<\u002Fdiv><h3>You write a migration<\u002Fh3><p>Define the table once, in code.<\u002Fp><\u002Fdiv>\n      <div class=\"parrow\"><svg viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 10h12M11 5l5 5-5 5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div class=\"pbox\"><div class=\"pn\">STEP 2<\u002Fdiv><h3>Lucid scans the DB<\u002Fh3><p>It generates typed columns into <code>database/schema.ts<\u002Fcode>.<\u002Fp><\u002Fdiv>\n      <div class=\"parrow\"><svg viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 10h12M11 5l5 5-5 5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div class=\"pbox\"><div class=\"pn\">STEP 3<\u002Fdiv><h3>Your model extends it<\u002Fh3><p>Columns stay in sync. You add behaviour.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"warnbox rise d3\">\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.1\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M10.3 3.4 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.4a2 2 0 0 0-3.4 0Z\"><\u002Fpath><path d=\"M12 9v4\"><\u002Fpath><path d=\"M12 17h.01\"><\u002Fpath><\u002Fsvg>\n      <p><b>Never edit<\u002Fb> <code>database/schema.ts<\u002Fcode> by hand — it's regenerated on <b>every migration run<\u002Fb>, so your changes will be wiped. Change the migration, not the generated file.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- The generated schema -->\n  <section class=\"s\" data-label=\"Generated schema\">\n    <div class=\"kicker rise\"><span class=\"ix\">3.6<\u002Fspan> Schema generation<\u002Fdiv>\n    <h2 class=\"title rise\">The generated schema<\u002Fh2>\n    <p class=\"ptext rise d1\" style=\"max-width:none;margin-top:8px\">After a migration, Lucid writes one typed class per table into <code>database/schema.ts<\u002Fcode>. Your models extend these — never the other way around.<\u002Fp>\n    <div class=\"row rise d2\" style=\"margin-top:24px;gap:40px;align-items:stretch;flex:0 0 auto\">\n      <div class=\"col\" style=\"flex:1\">\n        <div class=\"codecard sm\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\"><span class=\"path\">database/<\u002Fspan>schema.ts<\u002Fspan><span class=\"cc-tag\">generated<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"ts\">export class UsersSchema extends BaseModel {\n  @column({ isPrimary: true })\n  declare id: number\n  @column() declare email: string\n  @column({ serializeAs: null })\n  declare password: string\n  @column.dateTime({ autoCreate: true })\n  declare createdAt: DateTime\n}<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"col\" style=\"flex:1\">\n        <div class=\"codecard sm\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\"><span class=\"path\">database/<\u002Fspan>schema.ts<\u002Fspan><span class=\"cc-tag\">generated<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"ts\">export class TodosSchema extends BaseModel {\n  @column({ isPrimary: true })\n  declare id: number\n  @column() declare title: string\n  @column() declare completed: boolean\n  @column() declare userId: number  // FK\n  @column.dateTime({ autoCreate: true })\n  declare createdAt: DateTime\n}<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"ptext rise d3\" style=\"max-width:none;margin-top:16px\"><code>serializeAs: null<\u002Fcode> hides the password from JSON, and <code>userId<\u002Fcode> is the foreign key to <code>users<\u002Fcode>.<\u002Fp>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 19 · The model -->\n  <section class=\"s\" data-label=\"Model\">\n    <div class=\"kicker rise\"><span class=\"ix\">3.7<\u002Fspan> The model<\u002Fdiv>\n    <h2 class=\"title rise\">Where relationships live<\u002Fh2>\n    <div class=\"row center\" style=\"margin-top:24px\">\n      <div class=\"col rise d1\">\n        <div class=\"codecard sm\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\"><span class=\"path\">app/models/<\u002Fspan>todo.ts<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"ts\">import { TodosSchema } from '#database/schema'\nimport { belongsTo } from '@adonisjs/lucid/orm'\nimport type { BelongsTo }\n  from '@adonisjs/lucid/types/relations'\nimport User from '#models/user'\n\nexport default class Todo extends TodosSchema {\n  // a todo belongs to one user\n  @belongsTo(() =&gt; User)\n  declare user: BelongsTo&lt;typeof User&gt;\n}<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"col rise d2\">\n        <div class=\"codecard sm\">\n          <div class=\"cc-head\"><span class=\"cc-dots\"><i style=\"background:#ff5f57\"><\u002Fi><i style=\"background:#febc2e\"><\u002Fi><i style=\"background:#28c840\"><\u002Fi><\u002Fspan><span class=\"cc-file\"><span class=\"path\">app/models/<\u002Fspan>user.ts<\u002Fspan><\u002Fdiv>\n          <pre><code data-lang=\"ts\">import { hasMany } from '@adonisjs/lucid/orm'\nimport type { HasMany }\n  from '@adonisjs/lucid/types/relations'\nimport Todo from '#models/todo'\n\nexport default class User extends UsersSchema {\n  // a user has many todos\n  @hasMany(() =&gt; Todo)\n  declare todos: HasMany&lt;typeof Todo&gt;\n}<\u002Fcode><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"flowcap rise d3\" style=\"margin-top:30px;margin-bottom:56px\">Columns are inherited from the generated schema — the <b>model<\u002Fb> is where <i>your<\u002Fi> code lives: the two sides of the relationship, plus hooks and computed properties.<\u002Fp>\n    <div class=\"brandmark\"><span class=\"lg\">A<\u002Fspan> AdonisJS 7<\u002Fdi
